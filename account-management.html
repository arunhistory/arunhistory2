<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>アカウント管理</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: linear-gradient(to bottom, #dff5e3 0%, #c7ebcf 45%, #aedfb9 100%);
      color: #111;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-top: 0;
      font-size: 2.5rem;
      line-height: 1.4;
      color: #111;
    }

    a {
      color: #111;
      text-decoration: none;
    }

    a:hover {
      color: #111;
      text-decoration: underline;
    }

    .box {
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(0,0,0,0.15);
      padding: 24px;
    }

    .box p {
      margin: 12px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <p style="text-align: left; margin-top: 0;">
      <a id="admin-user-link" href="#">管理者さん</a>
    </p>

    <h1>アカウント管理</h1>

    <div class="box">
      <p><a href="account-info-admin.html">アカウント情報</a></p>
      <p><a href="user-applications.html">ユーザー申請</a></p>
      <p><a href="license-change.html">ライセンス変更</a></p>
      <p><a href="withdraw-requests.html">退会申請確認</a></p>
      <p><a href="user-inquiries.html">ユーザーお問い合わせ</a></p>
      <p><a href="admin-home.html">戻る</a></p>
    </div>
  </div>

  <script>
    if (sessionStorage.getItem("admin_logged_in") !== "1") {
      window.location.href = "admin-login.html";
    }

    const adminUserLink = document.getElementById("admin-user-link");
    const savedAdminName = sessionStorage.getItem("admin_username") || "管理者";
    adminUserLink.textContent = savedAdminName + "さん";
  </script>
</body>
</html>
