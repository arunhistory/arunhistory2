<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理者ログイン</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: linear-gradient(to bottom, #dff5e3 0%, #c7ebcf 45%, #aedfb9 100%);
      color: #111;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-top: 0;
      font-size: 2.5rem;
      line-height: 1.4;
      color: #111;
    }

    a {
      color: #111;
      text-decoration: none;
    }

    a:hover {
      color: #111;
      text-decoration: underline;
    }

    .box {
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(0,0,0,0.15);
      padding: 24px;
    }

    .box p {
      margin: 12px 0;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #111;
      cursor: default;
      user-select: none;
    }

    input,
    button {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      box-sizing: border-box;
      font-size: 16px;
      font-family: inherit;
    }

    input {
      display: block;
      padding: 10px;
      border: 1px solid rgba(0,0,0,0.2);
      background: #fff;
      color: #111;
    }

    button {
      padding: 12px;
      border: none;
      background-color: #4f8f5b;
      color: #111;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background-color: #6aa676;
    }

    .center-link {
      text-align: center;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>管理者ログイン</h1>

    <div class="box">
      <form id="admin-login-form">
        <p>
          <label for="admin-id" id="admin-id-label">ユーザー名</label>
          <input type="text" id="admin-id" name="admin-id" required>
        </p>

        <p>
          <label for="admin-password" id="admin-password-label">パスワード</label>
          <input type="password" id="admin-password" name="admin-password" required>
        </p>

        <p>
          <button type="submit" id="admin-login-button">ログイン</button>
        </p>
      </form>

      <p class="center-link">
        <a href="maintenance.html">戻る</a>
      </p>
    </div>
  </div>

  <script>
    const SECRET_LOGIN_TAP_KEY = "admin_reset_login_tap_count";
    const SECRET_ID_TAP_KEY = "admin_reset_id_tap_count";
    const SECRET_PASSWORD_TAP_KEY = "admin_reset_password_tap_count";
    const SECRET_READY_KEY = "admin_reset_ready";

    document.addEventListener("DOMContentLoaded", () => {
      const loginForm = document.getElementById("admin-login-form");
      const adminIdInput = document.getElementById("admin-id");
      const adminPasswordInput = document.getElementById("admin-password");
      const adminLoginButton = document.getElementById("admin-login-button");
      const adminIdLabel = document.getElementById("admin-id-label");
      const adminPasswordLabel = document.getElementById("admin-password-label");

      let loginTapCount = Number(sessionStorage.getItem(SECRET_LOGIN_TAP_KEY) || "0");
      let idTapCount = Number(sessionStorage.getItem(SECRET_ID_TAP_KEY) || "0");
      let passwordTapCount = Number(sessionStorage.getItem(SECRET_PASSWORD_TAP_KEY) || "0");

      function saveTapState() {
        sessionStorage.setItem(SECRET_LOGIN_TAP_KEY, String(loginTapCount));
        sessionStorage.setItem(SECRET_ID_TAP_KEY, String(idTapCount));
        sessionStorage.setItem(SECRET_PASSWORD_TAP_KEY, String(passwordTapCount));

        if (loginTapCount >= 10 && idTapCount >= 5 && passwordTapCount >= 5) {
          sessionStorage.setItem(SECRET_READY_KEY, "1");
        }
      }

      if (sessionStorage.getItem(SECRET_READY_KEY) === "1") {
        sessionStorage.removeItem(SECRET_READY_KEY);
        sessionStorage.removeItem(SECRET_LOGIN_TAP_KEY);
        sessionStorage.removeItem(SECRET_ID_TAP_KEY);
        sessionStorage.removeItem(SECRET_PASSWORD_TAP_KEY);
        window.location.href = "admin-password-reset.html";
        return;
      }

      adminLoginButton.addEventListener("click", () => {
        loginTapCount += 1;
        saveTapState();
      });

      adminIdLabel.addEventListener("click", () => {
        idTapCount += 1;
        saveTapState();
      });

      adminPasswordLabel.addEventListener("click", () => {
        passwordTapCount += 1;
        saveTapState();
      });

      loginForm.addEventListener("submit", async function (e) {
        e.preventDefault();

        const adminId = adminIdInput.value.trim();
        const adminPassword = adminPasswordInput.value;

        if (!adminId || !adminPassword) {
          alert("ユーザー名とパスワードを入力してください。");
          return;
        }

        adminLoginButton.disabled = true;
        adminLoginButton.textContent = "ログイン中...";

        try {
          const response = await fetch("https://ndtxjdhvdedflyqgpizr.supabase.co/functions/v1/admin-login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kdHhqZGh2ZGVkZmx5cWdwaXpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjM0MjIsImV4cCI6MjA4OTIzOTQyMn0.IVDQg_I0VeBzE2z7gXiS5p1Ci4k620qYgZSXjyenyb4"
            },
            body: JSON.stringify({
              username: adminId,
              password: adminPassword
            })
          });

          const result = await response.json();

          if (!response.ok || !result?.ok) {
            alert(result?.error || "ユーザー名またはパスワードが違います。");
            return;
          }

          sessionStorage.setItem("admin_logged_in", "1");
          sessionStorage.setItem("admin_username", result.admin.username);
          sessionStorage.setItem("admin_role", result.admin.role);
          sessionStorage.setItem("admin_status", result.admin.status);
          sessionStorage.setItem("admin_permissions", JSON.stringify(result.admin.permissions || []));

          window.location.href = "admin-home.html";
        } catch (_err) {
          alert("ログインに失敗しました。");
        } finally {
          adminLoginButton.disabled = false;
          adminLoginButton.textContent = "ログイン";
        }
      });
    });
  </script>
</body>
</html>
