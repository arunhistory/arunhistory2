<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>音楽ライセンス申請</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: linear-gradient(to bottom, #0b1026 0%, #1a2342 45%, #2f3d68 100%);
      color: #f5f5f5;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 24px;
      font-size: 2.4rem;
      line-height: 1.4;
    }

    a {
      color: #f2d9e8;
      text-decoration: none;
    }

    a:hover {
      color: #ffe7f3;
      text-decoration: underline;
    }

    .box {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.25);
      padding: 24px;
      margin-bottom: 20px;
    }

    .box p {
      margin: 12px 0;
      line-height: 1.8;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input,
    select,
    button {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      display: block;
      box-sizing: border-box;
      padding: 10px;
      font-size: 16px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.95);
      color: #222;
      font-family: inherit;
    }

    button {
      border: none;
      background-color: #7a5c61;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background-color: #9a747b;
    }

    .center-link {
      text-align: center;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>音楽ライセンス申請</h1>
    
    <p style="text-align: center; line-height: 1.8; margin: 0 0 20px 0;">
  申請後、結果反映まで最大2週間いただいております。
</p>

    <div class="box">
      <form id="music-license-form">
        <p>
          <label for="requested-license">申請ライセンス</label>
          <select id="requested-license" required>
            <option value="">選択してください</option>
            <option value="license_a">ライセンスA</option>
            <option value="license_b">ライセンスB</option>
          </select>
        </p>

        <p>
          <label for="note-account-name">noteアカウント名</label>
          <input type="text" id="note-account-name" required>
        </p>

        <p>
          <label for="license-user-name">ライセンス使用者名</label>
          <input type="text" id="license-user-name" required>
        </p>

        <p>
          <button type="submit" id="submit-button">送信</button>
        </p>
      </form>

      <p class="center-link">
        <a href="application-status.html">戻る</a>
      </p>
    </div>

  <script>
  document.addEventListener("DOMContentLoaded", async () => {
    if (!window.supabase || typeof window.supabase.createClient !== "function") {
      alert("ページの読み込みに失敗しました。");
      return;
    }

    const supabaseUrl = "https://ndtxjdhvdedflyqgpizr.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kdHhqZGh2ZGVkZmx5cWdwaXpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjM0MjIsImV4cCI6MjA4OTIzOTQyMn0.IVDQg_I0VeBzE2z7gXiS5p1Ci4k620qYgZSXjyenyb4";
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const form = document.getElementById("music-license-form");
    const submitButton = document.getElementById("submit-button");

    const {
      data: { session },
      error: sessionError
    } = await supabase.auth.getSession();

    if (sessionError) {
      alert("ログイン情報の取得に失敗しました。");
      return;
    }

    if (!session) {
      window.location.href = "login.html?redirect=" + encodeURIComponent("application-music-license.html");
      return;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const requestedLicense = document.getElementById("requested-license").value;
      const noteAccountName = document.getElementById("note-account-name").value.trim();
      const licenseUserName = document.getElementById("license-user-name").value.trim();

      if (!requestedLicense || !noteAccountName || !licenseUserName) {
        alert("必要項目を入力してください。");
        return;
      }

      submitButton.disabled = true;
      submitButton.textContent = "送信中...";

      try {
        const response = await fetch(`${supabaseUrl}/functions/v1/submit-music-license-application-v2`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": supabaseKey,
            "Authorization": "Bearer " + supabaseKey
          },
          body: JSON.stringify({
            access_token: session.access_token,
            requested_license: requestedLicense,
            note_account_name: noteAccountName,
            license_user_name: licenseUserName
          })
        });

        const rawText = await response.text();
        let result = null;

        try {
          result = rawText ? JSON.parse(rawText) : {};
        } catch (_) {
          alert("送信に失敗しました。");
          submitButton.disabled = false;
          submitButton.textContent = "送信";
          return;
        }

        if (!response.ok || !result || !result.ok) {
          alert(result?.error || "送信に失敗しました。");
          submitButton.disabled = false;
          submitButton.textContent = "送信";
          return;
        }

        alert("申請受け付けました");
        window.location.href = "application-status.html";
      } catch (error) {
        alert("送信に失敗しました。");
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = "送信";
      }
    });
  });
</script>
</body>
</html>
