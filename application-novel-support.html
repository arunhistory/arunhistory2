<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>小説応援申請</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: linear-gradient(to bottom, #0b1026 0%, #1a2342 45%, #2f3d68 100%);
      color: #f5f5f5;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 24px;
      font-size: 2.4rem;
      line-height: 1.4;
    }

    a {
      color: #f2d9e8;
      text-decoration: none;
    }

    a:hover {
      color: #ffe7f3;
      text-decoration: underline;
    }

    .box {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.25);
      padding: 24px;
      margin-bottom: 20px;
    }

    .box p {
      margin: 12px 0;
      line-height: 1.8;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input,
    button {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      display: block;
      box-sizing: border-box;
      padding: 10px;
      font-size: 16px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.95);
      color: #222;
      font-family: inherit;
    }

    input[type="file"] {
      padding: 8px;
    }

    button {
      border: none;
      background-color: #7a5c61;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background-color: #9a747b;
    }

    .center-link {
      text-align: center;
      margin-top: 16px;
    }

    .preview-wrap {
      margin-top: 12px;
    }

    .preview-image {
      display: block;
      width: 100%;
      max-width: 100%;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.08);
    }

    .note-text {
      font-size: 0.95rem;
      line-height: 1.8;
      color: #f5f5f5;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>小説応援申請</h1>

    <div class="box">
      <form id="novel-support-form">
        <p>
          <label for="note-name">noteアカウント名</label>
          <input type="text" id="note-name" required>
        </p>

        <p>
          <label for="support-screenshot">スクリーンショット</label>
          <input type="file" id="support-screenshot" accept="image/*" required>
        </p>

        <div class="preview-wrap">
          <p>プレビュー</p>
          <img id="preview-image" class="preview-image" alt="プレビュー画像" style="display:none;">
          <p id="preview-empty">まだ画像は選択されていません。</p>
        </div>

        <p class="note-text">※【難しい場合は、お問い合わせにご連絡ください】</p>

        <p>
          <button type="submit" id="submit-button">送信</button>
        </p>
      </form>

      <p class="center-link">
        <a href="application-status.html">戻る</a>
      </p>
    </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const form = document.getElementById("novel-support-form");
      const submitButton = document.getElementById("submit-button");
      const screenshotInput = document.getElementById("support-screenshot");
      const previewImage = document.getElementById("preview-image");
      const previewEmpty = document.getElementById("preview-empty");

      function showPreview(file) {
        if (!file) {
          previewImage.style.display = "none";
          previewImage.removeAttribute("src");
          previewEmpty.style.display = "block";
          return;
        }

        const reader = new FileReader();
        reader.onload = () => {
          previewImage.src = reader.result;
          previewImage.style.display = "block";
          previewEmpty.style.display = "none";
        };
        reader.readAsDataURL(file);
      }

      screenshotInput.addEventListener("change", () => {
        const file = screenshotInput.files && screenshotInput.files[0] ? screenshotInput.files[0] : null;
        showPreview(file);
      });

      if (!window.supabase || typeof window.supabase.createClient !== "function") {
        alert("ページの読み込みに失敗しました。");
        return;
      }

      const supabaseUrl = "https://ndtxjdhvdedflyqgpizr.supabase.co";
      const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kdHhqZGh2ZGVkZmx5cWdwaXpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjM0MjIsImV4cCI6MjA4OTIzOTQyMn0.IVDQg_I0VeBzE2z7gXiS5p1Ci4k620qYgZSXjyenyb4";
      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

      const {
        data: { session },
      } = await supabase.auth.getSession();

      if (!session) {
        window.location.href = "login.html?redirect=" + encodeURIComponent("application-novel-support.html");
        return;
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const noteName = document.getElementById("note-name").value.trim();
        const file = screenshotInput.files && screenshotInput.files[0] ? screenshotInput.files[0] : null;

        if (!noteName || !file) {
          alert("必要項目を入力してください。");
          return;
        }

        submitButton.disabled = true;
        submitButton.textContent = "送信中...";

        try {
          const userId = session.user.id;
          const fileExt = (file.name.split(".").pop() || "png").toLowerCase();
          const filePath = `${userId}/${Date.now()}-support.${fileExt}`;

          const { error: uploadError } = await supabase
            .storage
            .from("novel-support-screenshots")
            .upload(filePath, file, { upsert: false });

          if (uploadError) {
            alert("画像のアップロードに失敗しました。");
            submitButton.disabled = false;
            submitButton.textContent = "送信";
            return;
          }

          const submitResponse = await fetch(`${supabaseUrl}/functions/v1/submit-novel-support-application`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "apikey": supabaseKey,
              "Authorization": "Bearer " + session.access_token
            },
            body: JSON.stringify({
              note_name: noteName,
              screenshot_url: filePath
            })
          });

          const submitRawText = await submitResponse.text();
          let submitResult = null;

          try {
            submitResult = submitRawText ? JSON.parse(submitRawText) : {};
          } catch (_) {
            alert("申請の送信に失敗しました。");
            submitButton.disabled = false;
            submitButton.textContent = "送信";
            return;
          }

          if (!submitResponse.ok || !submitResult || !submitResult.ok) {
            alert(submitResult?.error || "申請の送信に失敗しました。");
            submitButton.disabled = false;
            submitButton.textContent = "送信";
            return;
          }

          const applicationId = submitResult.application_id;

          if (!applicationId) {
            alert("申請は送信されましたが、分類処理に進めませんでした。");
            submitButton.disabled = false;
            submitButton.textContent = "送信";
            return;
          }

          const classifyResponse = await fetch(`${supabaseUrl}/functions/v1/classify-novel-support-screenshot`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "apikey": supabaseKey,
              "Authorization": "Bearer " + supabaseKey
            },
            body: JSON.stringify({
              application_id: applicationId
            })
          });

          const classifyRawText = await classifyResponse.text();
          let classifyResult = null;

          try {
            classifyResult = classifyRawText ? JSON.parse(classifyRawText) : {};
          } catch (_) {
            alert("申請は送信されましたが、分類処理に失敗しました。");
            form.reset();
            showPreview(null);
            submitButton.disabled = false;
            submitButton.textContent = "送信";
            return;
          }

          if (!classifyResponse.ok || !classifyResult || !classifyResult.ok) {
            alert(classifyResult?.error || "申請は送信されましたが、分類処理に失敗しました。");
            form.reset();
            showPreview(null);
            submitButton.disabled = false;
            submitButton.textContent = "送信";
            return;
          }

          if (classifyResult.classified === false && classifyResult.status === "cancelled") {
            alert("申請が取り消されました。再度、申請お願いします。");
            form.reset();
            showPreview(null);
            submitButton.disabled = false;
            submitButton.textContent = "送信";
            return;
          }

          alert("小説応援申請を送信しました。");
          form.reset();
          showPreview(null);
        } catch (error) {
          alert("送信に失敗しました。");
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = "送信";
        }
      });
    });
  </script>
</body>
</html>
