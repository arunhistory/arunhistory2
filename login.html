<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログイン</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-gradient: linear-gradient(to bottom, #0b1026 0%, #1a2342 45%, #2f3d68 100%);
      --accent-color: #f2d9e8;
      --accent-hover: #ffe7f3;
      --glass-bg: rgba(255, 255, 255, 0.07);
      --border-color: rgba(255, 255, 255, 0.2);
      --button-bg: #7a5c61;
      --button-hover: #9a747b;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: var(--bg-gradient) fixed;
      color: #f5f5f5;
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      overflow-x: hidden;
    }

    .star-field {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0;
      animation: blink var(--duration) infinite ease-in-out;
      box-shadow: 0 0 4px 1px rgba(255, 255, 255, 0.3);
    }

    @keyframes blink {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: var(--max-opacity); transform: scale(1); }
    }

    .container {
      position: relative;
      z-index: 10;
      max-width: 450px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    h1 {
      text-align: center;
      font-size: 2.2rem;
      letter-spacing: 0.15em;
      margin-bottom: 2rem;
      text-shadow: 0 0 15px rgba(242, 217, 232, 0.3);
      cursor: pointer;
      user-select: none;
    }

    .form-box {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .form-box p {
      margin: 0 0 20px 0;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      font-weight: bold;
      color: var(--accent-color);
      letter-spacing: 0.05em;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      font-size: 16px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      color: #222;
      transition: all 0.3s;
      font-family: inherit;
    }

    input:focus {
      outline: none;
      background: #fff;
      box-shadow: 0 0 8px var(--accent-color);
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      background-color: var(--button-bg);
      color: #fff;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 0.1em;
      margin-top: 10px;
    }

    button:hover {
      background-color: var(--button-hover);
      transform: translateY(-2px);
    }

    .sub-links {
      text-align: center;
      margin-top: 24px;
      font-size: 0.85rem;
    }

    .sub-links p {
      margin: 10px 0;
    }

    a {
      color: var(--accent-color);
      text-decoration: none;
      transition: color 0.3s;
    }

    a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="star-field" id="starField"></div>

  <div class="container">
    <h1 id="login-title">ログイン</h1>

    <div class="form-box">
      <form id="login-form">
        <p>
          <label for="email">メールアドレス</label>
          <input type="email" id="email" name="email">
        </p>

        <p>
          <label for="password">パスワード</label>
          <input type="password" id="password" name="password">
        </p>

        <p id="secret-wrap" style="display: none;">
          <label for="secret-word">&nbsp;</label>
          <input type="text" id="secret-word" name="secret-word" autocomplete="off">
        </p>

        <p>
          <button type="submit" id="login-button">ログイン</button>
        </p>
      </form>

      <div class="sub-links">
        <p><a id="signup-link" href="signup.html">新規登録はこちら</a></p>
        <p><a id="forgot-link" href="forgot-password.html">パスワードを忘れた方はこちら</a></p>
        <p><a id="back-link" href="index.html">戻る</a></p>
      </div>
    </div>
  </div>

  <script>
    const starField = document.getElementById("starField");
    const starCount = 80;

    for (let i = 0; i < starCount; i++) {
      const star = document.createElement("div");
      star.className = "star";

      const x = Math.random() * 100;
      const y = Math.random() * 100;
      const size = Math.random() * 2 + 1;
      const duration = Math.random() * 3 + 2;
      const delay = Math.random() * 5;
      const maxOpacity = Math.random() * 0.4 + 0.2;

      star.style.left = `${x}%`;
      star.style.top = `${y}%`;
      star.style.width = `${size}px`;
      star.style.height = `${size}px`;
      star.style.setProperty("--duration", `${duration}s`);
      star.style.setProperty("--max-opacity", maxOpacity);
      star.style.animationDelay = `${delay}s`;

      starField.appendChild(star);
    }

    document.addEventListener("DOMContentLoaded", async () => {
      const params = new URLSearchParams(window.location.search);
      const redirect = params.get("redirect") || "index.html";

      const backLink = document.getElementById("back-link");
      const signupLink = document.getElementById("signup-link");
      const forgotLink = document.getElementById("forgot-link");
      const form = document.getElementById("login-form");
      const submitButton = document.getElementById("login-button");
      const title = document.getElementById("login-title");
      const secretWrap = document.getElementById("secret-wrap");
      const secretWord = document.getElementById("secret-word");

      const ADMIN_TAP_COUNT_KEY = "hidden_admin_title_tap_count";
      const ADMIN_UNLOCK_KEY = "hidden_admin_title_unlocked";
      const ADMIN_SECRET_WORD = "ここに合言葉";

      backLink.href = redirect;
      signupLink.href = "signup.html?redirect=" + encodeURIComponent(redirect);
      forgotLink.href = "forgot-password.html?redirect=" + encodeURIComponent(redirect);

      if (!window.supabase || typeof window.supabase.createClient !== "function") {
        alert("Supabase の読み込みに失敗しました。");
        return;
      }

      const supabaseUrl = "https://ndtxjdhvdedflyqgpizr.supabase.co";
      const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kdHhqZGh2ZGVkZmx5cWdwaXpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjM0MjIsImV4cCI6MjA4OTIzOTQyMn0.IVDQg_I0VeBzE2z7gXiS5p1Ci4k620qYgZSXjyenyb4";
      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

      if (sessionStorage.getItem("admin_logged_in") !== "1") {
        const { data: maintenanceSetting, error: maintenanceError } = await supabase
          .from("site_settings")
          .select("setting_value")
          .eq("setting_key", "maintenance_mode")
          .maybeSingle();

        if (!maintenanceError && maintenanceSetting?.setting_value === "on") {
          window.location.href = "maintenance.html";
          return;
        }
      }

      const adminUnlocked = localStorage.getItem(ADMIN_UNLOCK_KEY) === "1";
      if (adminUnlocked) {
        secretWrap.style.display = "block";
      }

      let titleTapCount = Number(localStorage.getItem(ADMIN_TAP_COUNT_KEY) || "0");

      title.addEventListener("click", () => {
        if (localStorage.getItem(ADMIN_UNLOCK_KEY) === "1") return;

        titleTapCount += 1;
        localStorage.setItem(ADMIN_TAP_COUNT_KEY, String(titleTapCount));

        if (titleTapCount >= 20) {
          localStorage.setItem(ADMIN_UNLOCK_KEY, "1");
          // 更新後に表示させる仕様なので、この場では表示しない
        }
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const secret = secretWord ? secretWord.value.trim() : "";

        if (localStorage.getItem(ADMIN_UNLOCK_KEY) === "1" && secret === ADMIN_SECRET_WORD) {
          localStorage.removeItem(ADMIN_TAP_COUNT_KEY);
          localStorage.removeItem(ADMIN_UNLOCK_KEY);
          window.location.href = "admin-login.html";
          return;
        }

        if (email === "" || password === "") {
          alert("メールアドレスorパスワードが間違ってます");
          return;
        }

        submitButton.disabled = true;
        submitButton.textContent = "ログイン中...";

        try {
          const { error } = await supabase.auth.signInWithPassword({
            email,
            password
          });

          if (error) {
            alert("メールアドレスorパスワードが間違ってます");
            return;
          }

          const { data: userData, error: userError } = await supabase.auth.getUser();
          if (userError || !userData?.user) {
            alert("ログインしましたが、ユーザー情報の取得に失敗しました。");
            return;
          }

          const user = userData.user;
          const meta = user.user_metadata || {};

          const { data: activeWithdraw } = await supabase
            .from("withdraw_requests")
            .select("id")
            .eq("user_id", user.id)
            .eq("status", "申請中")
            .maybeSingle();

          if (activeWithdraw) {
            await supabase
              .from("withdraw_requests")
              .update({
                status: "取り消し",
                updated_at: new Date().toISOString()
              })
              .eq("id", activeWithdraw.id);
          }

          const { data: existingAccount, error: checkError } = await supabase
            .from("accounts")
            .select("id")
            .eq("user_id", user.id)
            .maybeSingle();

          if (checkError) {
            alert("ログインは成功しましたが、accounts確認に失敗しました: " + checkError.message);
            return;
          }

          if (!existingAccount) {
            const { error: insertError } = await supabase.from("accounts").insert([
              {
                user_id: user.id,
                display_name: meta.display_name || "",
                email: user.email || "",
                birthdate: meta.birthdate || null,
                gender: meta.gender || null,
                country: meta.country || null,
                role: "user",
                status: "active",
                license_status: "無し",
                novel_support_status: "なし",
                created_at: new Date().toISOString()
              }
            ]);

            if (insertError) {
              alert("ログインは成功しましたが、accounts保存に失敗しました: " + insertError.message);
              return;
            }
          }

          const { error: loginUpdateError } = await supabase
            .from("accounts")
            .update({
              last_login_at: new Date().toISOString()
            })
            .eq("user_id", user.id);

          if (loginUpdateError) {
            alert("ログインは成功しましたが、最終ログイン日時の更新に失敗しました: " + loginUpdateError.message);
            return;
          }

          alert("ログインしました");
          window.location.href = redirect;
        } catch (err) {
          alert("予期しないエラーが発生しました。");
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = "ログイン";
        }
      });
    });
  </script>
</body>
</html>
