<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理者メニュー</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: linear-gradient(to bottom, #dff5e3 0%, #c7ebcf 45%, #aedfb9 100%);
      color: #111;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-top: 0;
      font-size: 2.5rem;
      line-height: 1.4;
      color: #111;
    }

    a {
      color: #111;
      text-decoration: none;
    }

    a:hover {
      color: #111;
      text-decoration: underline;
    }

    .box {
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(0,0,0,0.15);
      padding: 24px;
    }

    .box p {
      margin: 12px 0;
    }

    .hidden {
      display: none;
    }

    details {
      margin-top: 20px;
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(0,0,0,0.12);
      padding: 12px;
    }

    summary {
      cursor: pointer;
      font-weight: bold;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 12px 0 0 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <p style="text-align: left; margin-top: 0;">
      <a id="admin-user-link" href="#">管理者さん</a>
    </p>

    <h1>管理者メニュー</h1>

    <div class="box">
      <p id="database-link-wrap" class="hidden">
        <a href="https://supabase.com/dashboard" target="_blank" rel="noopener noreferrer">データベース側へ行く</a>
      </p>

      <p id="account-management-wrap" class="hidden">
        <a href="account-management.html">アカウント管理</a>
      </p>

      <p id="music-management-wrap" class="hidden">
        <a href="music-management.html">音楽管理</a>
      </p>

      <p id="novel-management-wrap" class="hidden">
        <a href="novel-management.html">小説管理</a>
      </p>

      <p id="notice-management-wrap" class="hidden">
        <a href="notice-management.html">お知らせ管理</a>
      </p>

      <p id="admin-management-wrap" class="hidden">
        <a href="admin-management.html">管理者の管理</a>
      </p>

      <p id="maintenance-control-wrap" class="hidden">
        <a href="maintenance-control.html">メンテナンス管理</a>
      </p>

      <p>
        <a href="index.html">総合トップへ行く</a>
      </p>

      <p>
        <a href="#" id="admin-logout">ログアウト</a>
      </p>
    </div>

    <details>
      <summary>通信結果</summary>
      <pre id="debug-box">読み込み中...</pre>
    </details>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (sessionStorage.getItem("admin_logged_in") !== "1") {
        window.location.href = "admin-login.html";
        return;
      }

      const supabaseUrl = "https://ndtxjdhvdedflyqgpizr.supabase.co";
      const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kdHhqZGh2ZGVkZmx5cWdwaXpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjM0MjIsImV4cCI6MjA4OTIzOTQyMn0.IVDQg_I0VeBzE2z7gXiS5p1Ci4k620qYgZSXjyenyb4";

      const adminUsername = sessionStorage.getItem("admin_username") || "管理者";
      const adminRole = sessionStorage.getItem("admin_role") || "";
      const adminStatus = sessionStorage.getItem("admin_status") || "";

      let adminPermissions = [];
      try {
        adminPermissions = JSON.parse(sessionStorage.getItem("admin_permissions") || "[]");
        if (!Array.isArray(adminPermissions)) {
          adminPermissions = [];
        }
      } catch {
        adminPermissions = [];
      }

      const adminUserLink = document.getElementById("admin-user-link");
      const debugBox = document.getElementById("debug-box");

      adminUserLink.textContent = adminUsername + "さん";

      function clearAdminSession() {
        sessionStorage.removeItem("admin_logged_in");
        sessionStorage.removeItem("admin_username");
        sessionStorage.removeItem("admin_id");
        sessionStorage.removeItem("admin_role");
        sessionStorage.removeItem("admin_status");
        sessionStorage.removeItem("admin_permissions");
      }

      async function writeLogoutLog() {
        const response = await fetch(`${supabaseUrl}/functions/v1/admin-write-log`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": supabaseKey,
            "Authorization": "Bearer " + supabaseKey
          },
          body: JSON.stringify({
            admin_username: adminUsername,
            target_type: null,
            target_id: null,
            action_type: "admin_logout",
            action_label: "管理者ログアウト",
            action_detail: `role: ${adminRole}`
          })
        });

        const rawText = await response.text();

        debugBox.textContent =
          "admin_username: " + adminUsername + "\n" +
          "admin_role: " + adminRole + "\n" +
          "admin_status: " + adminStatus + "\n" +
          "admin_permissions: " + JSON.stringify(adminPermissions, null, 2) +
          "\n\nlogout status: " + response.status +
          "\nlogout response:\n" + rawText;

        return response.ok;
      }

      if (adminStatus !== "active") {
        alert("この管理者アカウントは停止中です。");
        clearAdminSession();
        window.location.href = "admin-login.html";
        return;
      }

      function show(id) {
        const el = document.getElementById(id);
        if (el) el.classList.remove("hidden");
      }

      if (adminRole === "admin") {
        show("database-link-wrap");
        show("account-management-wrap");
        show("music-management-wrap");
        show("novel-management-wrap");
        show("notice-management-wrap");
        show("admin-management-wrap");
        show("maintenance-control-wrap");
      } else if (adminRole === "sub_admin") {
        if (adminPermissions.includes("database_management")) {
          show("database-link-wrap");
        }
        if (adminPermissions.includes("account_management") || adminPermissions.includes("user_danger_control")) {
          show("account-management-wrap");
        }
        if (adminPermissions.includes("music_management")) {
          show("music-management-wrap");
        }
        if (adminPermissions.includes("novel_management")) {
          show("novel-management-wrap");
        }
        if (adminPermissions.includes("notice_management")) {
          show("notice-management-wrap");
        }
      }

      debugBox.textContent =
        "admin_username: " + adminUsername + "\n" +
        "admin_role: " + adminRole + "\n" +
        "admin_status: " + adminStatus + "\n" +
        "admin_permissions: " + JSON.stringify(adminPermissions, null, 2);

      document.getElementById("admin-logout").addEventListener("click", async function (e) {
        e.preventDefault();

        try {
          await writeLogoutLog();
        } catch (error) {
          debugBox.textContent =
            "admin_username: " + adminUsername + "\n" +
            "admin_role: " + adminRole + "\n" +
            "admin_status: " + adminStatus + "\n" +
            "admin_permissions: " + JSON.stringify(adminPermissions, null, 2) +
            "\n\nlogout fetch error:\n" + String(error);
        }

        clearAdminSession();
        window.location.href = "index.html";
      });
    });
  </script>
</body>
</html>
