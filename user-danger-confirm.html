<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>危険操作確認</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: linear-gradient(to bottom, #dff5e3 0%, #c7ebcf 45%, #aedfb9 100%);
      color: #111;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-top: 0;
      font-size: 2.3rem;
      line-height: 1.4;
      color: #111;
    }

    a {
      color: #111;
      text-decoration: none;
    }

    a:hover {
      color: #111;
      text-decoration: underline;
    }

    .box {
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(0,0,0,0.15);
      padding: 24px;
      margin-bottom: 20px;
    }

    .box p {
      margin: 12px 0;
      line-height: 1.8;
      word-break: break-all;
    }

    .warning-box {
      background: rgba(255,255,255,0.75);
      border: 2px solid rgba(120,0,0,0.45);
      padding: 20px;
      margin-bottom: 20px;
    }

    .warning-title {
      font-weight: bold;
      color: #b00000;
      margin-bottom: 8px;
    }

    .danger-button {
      width: 100%;
      padding: 16px;
      font-size: 20px;
      border: 2px solid #111;
      background: repeating-linear-gradient(
        -45deg,
        #ffd400 0px,
        #ffd400 14px,
        #111 14px,
        #111 28px
      );
      color: #c00000;
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
      letter-spacing: 1px;
      text-shadow: 0 1px 0 rgba(255,255,255,0.35);
    }

    .danger-button:hover {
      filter: brightness(1.05);
    }

    .center-link {
      text-align: center;
      margin-top: 16px;
    }

    .done-message {
      text-align: center;
      font-weight: bold;
    }

    details {
      margin-top: 20px;
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(0,0,0,0.12);
      padding: 12px;
    }

    summary {
      cursor: pointer;
      font-weight: bold;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 12px 0 0 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <p style="text-align: left; margin-top: 0;">
      <a id="admin-user-link" href="#">管理者さん</a>
    </p>

    <h1>危険操作確認</h1>

    <div class="warning-box">
      <p class="warning-title">最終確認</p>
      <p>
        これより先は危険操作の実行確認です。<br>
        内容を再確認してください。
      </p>
    </div>

    <div class="box">
      <p>対象ユーザーID: <span id="target-user-id">読み込み中...</span></p>
      <p>処理内容: <span id="danger-action">読み込み中...</span></p>
      <p>一部利用停止内容: <span id="danger-restrictions">読み込み中...</span></p>
      <p>理由: <span id="danger-reason">読み込み中...</span></p>
      <p>実行アカウント: <span id="danger-by">読み込み中...</span></p>
      <p>認証時刻: <span id="danger-at">読み込み中...</span></p>
    </div>

    <div class="box">
      <button type="button" class="danger-button" id="execute-button">進む</button>

      <p class="center-link">
        <a id="back-link" href="#">戻る</a>
      </p>
    </div>

    <div class="box" id="result-box" style="display:none;">
      <p class="done-message" id="result-message"></p>
      <p class="center-link">
        <a id="detail-link" href="#">ユーザー情報へ戻る</a>
      </p>
    </div>

    <details>
      <summary>通信結果</summary>
      <pre id="debug-box">読み込み中...</pre>
    </details>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      if (sessionStorage.getItem("admin_logged_in") !== "1") {
        window.location.href = "admin-login.html";
        return;
      }

      const adminUsername = sessionStorage.getItem("admin_username") || "管理者";
      const adminId = sessionStorage.getItem("admin_id");
      const adminRole = sessionStorage.getItem("admin_role") || "";
      const adminStatus = sessionStorage.getItem("admin_status") || "";

      let adminPermissions = [];
      try {
        adminPermissions = JSON.parse(sessionStorage.getItem("admin_permissions") || "[]");
        if (!Array.isArray(adminPermissions)) {
          adminPermissions = [];
        }
      } catch {
        adminPermissions = [];
      }

      const adminUserLink = document.getElementById("admin-user-link");
      const debugBox = document.getElementById("debug-box");
      const executeButton = document.getElementById("execute-button");
      const resultBox = document.getElementById("result-box");
      const resultMessage = document.getElementById("result-message");

      adminUserLink.textContent = adminUsername + "さん";

      const params = new URLSearchParams(window.location.search);
      const userId = params.get("id");

      function clearAdminSession() {
        sessionStorage.removeItem("admin_logged_in");
        sessionStorage.removeItem("admin_username");
        sessionStorage.removeItem("admin_id");
        sessionStorage.removeItem("admin_role");
        sessionStorage.removeItem("admin_status");
        sessionStorage.removeItem("admin_permissions");
      }

      function clearDangerSession() {
        sessionStorage.removeItem("danger_action_target_user_id");
        sessionStorage.removeItem("danger_action_type");
        sessionStorage.removeItem("danger_action_reason");
        sessionStorage.removeItem("danger_action_restrictions");
        sessionStorage.removeItem("danger_verified_user_id");
        sessionStorage.removeItem("danger_verified_by");
        sessionStorage.removeItem("danger_verified_at");
      }

      function renderDebug(extra = "") {
        debugBox.textContent =
          "admin_username: " + adminUsername + "\n" +
          "admin_id: " + (adminId || "") + "\n" +
          "admin_role: " + adminRole + "\n" +
          "admin_status: " + adminStatus + "\n" +
          "user_id: " + (userId || "") + "\n" +
          "admin_permissions: " + JSON.stringify(adminPermissions, null, 2) +
          (extra ? "\n\n" + extra : "");
      }

      function actionLabel(value) {
        if (value === "partial_suspended") return "一部利用停止";
        if (value === "suspended") return "利用停止";
        if (value === "active") return "利用再開";
        if (value === "banned") return "BAN";
        if (value === "delete") return "削除";
        return value || "";
      }

      function restrictionLabel(values) {
        if (!Array.isArray(values) || values.length === 0) return "なし";

        return values.map((value) => {
          if (value === "novel_blocked") return "小説利用停止";
          if (value === "music_blocked") return "音楽利用停止";
          return value;
        }).join(" / ");
      }

      if (adminStatus !== "active") {
        alert("この管理者アカウントは停止中です。");
        clearAdminSession();
        window.location.href = "admin-login.html";
        return;
      }

      if (!userId) {
        alert("対象ユーザーが指定されていません。");
        window.location.href = "account-info-admin.html";
        return;
      }

      const supabaseUrl = "https://ndtxjdhvdedflyqgpizr.supabase.co";
      const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kdHhqZGh2ZGVkZmx5cWdwaXpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjM0MjIsImV4cCI6MjA4OTIzOTQyMn0.IVDQg_I0VeBzE2z7gXiS5p1Ci4k620qYgZSXjyenyb4";
      const applyEndpoint = `${supabaseUrl}/functions/v1/admin-apply-user-danger-action`;

      async function writePageLog(actionType, actionLabelText, actionDetail, logTargetType = "user", logTargetId = userId) {
        const response = await fetch(`${supabaseUrl}/functions/v1/admin-write-log`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": supabaseKey,
            "Authorization": "Bearer " + supabaseKey
          },
          body: JSON.stringify({
            admin_username: adminUsername,
            target_type: logTargetType,
            target_id: logTargetId,
            action_type: actionType,
            action_label: actionLabelText,
            action_detail: actionDetail
          })
        });

        const rawText = await response.text();

        renderDebug(
          "log status: " + response.status +
          "\nlog response:\n" + rawText
        );

        return response.ok;
      }

      const canUseDangerConfirm =
        adminRole === "admin" ||
        (adminRole === "sub_admin" && adminPermissions.includes("user_danger_control"));

      if (!canUseDangerConfirm) {
        try {
          await writePageLog(
            "admin_forbidden_page_access",
            "権限外ページアクセス",
            "page: user-danger-confirm.html / reason: user_danger_control権限なし"
          );
        } catch (error) {
          renderDebug("拒否ログ保存失敗: " + String(error));
        }

        alert("この機能を使う権限がありません。");
        window.location.href = "admin-home.html";
        return;
      }

      const verifiedUserId = sessionStorage.getItem("danger_verified_user_id");
      const verifiedBy = sessionStorage.getItem("danger_verified_by");
      const verifiedAt = sessionStorage.getItem("danger_verified_at");
      const actionUserId = sessionStorage.getItem("danger_action_target_user_id");
      const actionTypeValue = sessionStorage.getItem("danger_action_type");
      const actionReason = sessionStorage.getItem("danger_action_reason");

      let actionRestrictions = [];
      try {
        actionRestrictions = JSON.parse(sessionStorage.getItem("danger_action_restrictions") || "[]");
        if (!Array.isArray(actionRestrictions)) actionRestrictions = [];
      } catch {
        actionRestrictions = [];
      }

      if (!verifiedUserId || !verifiedBy || !verifiedAt || !actionUserId || !actionTypeValue || !actionReason) {
        alert("危険操作情報が不足しています。");
        window.location.href = "account-info-admin.html";
        return;
      }

      if (userId !== verifiedUserId || userId !== actionUserId) {
        alert("対象ユーザー情報が一致しません。");
        window.location.href = "account-info-admin.html";
        return;
      }

      try {
        await writePageLog(
          "user_danger_confirm_view",
          "危険操作確認閲覧",
          `page: user-danger-confirm.html / user_id: ${userId} / action: ${actionTypeValue} / role: ${adminRole}`
        );
      } catch (error) {
        renderDebug("閲覧ログ保存失敗: " + String(error));
      }

      document.getElementById("target-user-id").textContent = userId;
      document.getElementById("danger-action").textContent = actionLabel(actionTypeValue);
      document.getElementById("danger-restrictions").textContent = restrictionLabel(actionRestrictions);
      document.getElementById("danger-reason").textContent = actionReason;
      document.getElementById("danger-by").textContent = verifiedBy;
      document.getElementById("danger-at").textContent = new Date(verifiedAt).toLocaleString("ja-JP");

      document.getElementById("back-link").href = "user-danger-settings.html?id=" + encodeURIComponent(userId);
      document.getElementById("detail-link").href = "user-detail.html?id=" + encodeURIComponent(userId);

      executeButton.addEventListener("click", async () => {
        const confirmed = window.confirm("本当によろしいですか？");
        if (!confirmed) {
          window.location.href = "user-danger-settings.html?id=" + encodeURIComponent(userId);
          return;
        }

        executeButton.disabled = true;
        executeButton.textContent = "処理中...";

        try {
          const payload = {
            admin_username: adminUsername,
            user_id: userId,
            action_type: actionTypeValue,
            reason: actionReason,
            service_restrictions: actionRestrictions
          };

          const response = await fetch(applyEndpoint, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "apikey": supabaseKey,
              "Authorization": "Bearer " + supabaseKey
            },
            body: JSON.stringify(payload)
          });

          const rawText = await response.text();
          let result = null;

          try {
            result = rawText ? JSON.parse(rawText) : {};
          } catch (_) {
            renderDebug(
              "apply response parse error\n\n" +
              "status: " + response.status + "\n" +
              rawText
            );
            alert("危険操作の実行に失敗しました。");
            executeButton.disabled = false;
            executeButton.textContent = "進む";
            return;
          }

          renderDebug(
            "apply payload:\n" + JSON.stringify(payload, null, 2) +
            "\n\nstatus: " + response.status +
            "\nresponse:\n" + JSON.stringify(result, null, 2)
          );

          if (!response.ok || !result || !result.ok) {
            alert(result?.error || "危険操作の実行に失敗しました。");
            executeButton.disabled = false;
            executeButton.textContent = "進む";
            return;
          }

          try {
            await writePageLog(
              "user_danger_execute",
              "危険操作実行",
              `user_id: ${userId} / action: ${actionTypeValue} / restrictions: ${JSON.stringify(actionRestrictions)} / reason: ${actionReason} / executed_by: ${verifiedBy}`
            );
          } catch (error) {
            renderDebug("実行ログ保存失敗: " + String(error));
          }

          resultMessage.textContent = result.message || "処理を実行しました。";
          resultBox.style.display = "block";

          clearDangerSession();
          executeButton.style.display = "none";
        } catch (error) {
          renderDebug("apply fetch error: " + String(error));
          alert("危険操作の実行に失敗しました。");
          executeButton.disabled = false;
          executeButton.textContent = "進む";
        }
      });

      renderDebug("危険操作確認表示成功");
    });
  </script>
</body>
</html>
