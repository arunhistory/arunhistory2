<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>お問い合わせ詳細</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      background: linear-gradient(to bottom, #dff5e3 0%, #c7ebcf 45%, #aedfb9 100%);
      color: #111;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
    }

    h1, h2 {
      text-align: center;
      margin-top: 0;
      line-height: 1.4;
      color: #111;
    }

    h1 {
      font-size: 2.4rem;
      margin-bottom: 20px;
    }

    h2 {
      font-size: 1.8rem;
      margin-bottom: 18px;
    }

    a {
      color: #111;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .top-link {
      margin-top: 0;
      margin-bottom: 18px;
    }

    .center-link {
      text-align: center;
      margin-top: 18px;
      margin-bottom: 18px;
      font-size: 1.2rem;
    }

    .box {
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(0,0,0,0.15);
      padding: 24px;
      margin-bottom: 20px;
    }

    .alert-box {
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(0,0,0,0.15);
      padding: 18px;
      margin-bottom: 20px;
      line-height: 1.8;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .summary-item {
      background: #fff;
      border: 1px solid rgba(0,0,0,0.15);
      padding: 16px;
    }

    .summary-label {
      font-size: 0.95rem;
      color: #444;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .summary-value {
      font-size: 1.15rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .chat-shell {
      background: linear-gradient(to bottom, #0e163f 0%, #24305d 100%);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 24px;
      color: #fff;
    }

    .chat-title {
      text-align: center;
      font-size: 2.2rem;
      font-weight: bold;
      margin: 0 0 20px 0;
      color: #fff;
    }

    .chat-status {
      margin-bottom: 18px;
      font-size: 1rem;
      color: rgba(255,255,255,0.9);
      line-height: 1.8;
    }

    .chat-log-wrap {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 24px;
      padding: 20px;
      max-height: 72vh;
      overflow-y: auto;
    }

    .chat-empty {
      text-align: center;
      color: rgba(255,255,255,0.9);
      padding: 60px 16px;
      font-size: 1.1rem;
    }

    .day-divider {
      text-align: center;
      margin: 22px 0 16px;
      color: rgba(255,255,255,0.75);
      font-size: 0.92rem;
    }

    .message-row {
      display: flex;
      margin-bottom: 14px;
    }

    .message-row.user {
      justify-content: flex-start;
    }

    .message-row.admin,
    .message-row.sub_admin {
      justify-content: flex-end;
    }

    .message-bubble {
      max-width: 82%;
      padding: 14px 16px;
      border-radius: 18px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .message-row.user .message-bubble {
      background: rgba(255,255,255,0.14);
      color: #fff;
      border-bottom-left-radius: 6px;
    }

    .message-row.admin .message-bubble,
    .message-row.sub_admin .message-bubble {
      background: #d9e4ff;
      color: #111;
      border-bottom-right-radius: 6px;
    }

    .message-meta {
      font-size: 0.82rem;
      margin-bottom: 8px;
      opacity: 0.85;
    }

    .message-text {
      font-size: 1rem;
    }

    .reply-box {
      margin-top: 22px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 24px;
      padding: 20px;
    }

    .reply-box p {
      margin-top: 0;
      margin-bottom: 14px;
      color: #fff;
      line-height: 1.7;
    }

    textarea,
    select,
    button {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      box-sizing: border-box;
      font-size: 16px;
      font-family: inherit;
    }

    textarea,
    select {
      border: 1px solid rgba(0,0,0,0.15);
      background: #fff;
      color: #111;
    }

    textarea {
      min-height: 140px;
      max-height: 140px;
      overflow-y: auto;
      resize: none;
      padding: 14px;
      line-height: 1.7;
    }

    select {
      padding: 12px;
    }

    button {
      padding: 14px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      margin-top: 14px;
    }

    .primary-button {
      background-color: #6b985c;
      color: #111;
    }

    .primary-button:hover {
      background-color: #7ead6d;
    }

    .secondary-button {
      background-color: #c7d5f1;
      color: #111;
    }

    .secondary-button:hover {
      background-color: #d7e1f7;
    }

    .manage-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .manage-card {
      background: #fff;
      border: 1px solid rgba(0,0,0,0.15);
      padding: 18px;
    }

    .manage-card h3 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 1.15rem;
    }

    .current-assignees {
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 80px;
    }

    .hidden {
      display: none !important;
    }

    details {
      margin-top: 20px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(0,0,0,0.15);
      padding: 12px;
    }

    summary {
      cursor: pointer;
      font-weight: bold;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 12px 0 0 0;
      font-size: 14px;
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 2rem;
      }

      .summary-grid,
      .manage-grid {
        grid-template-columns: 1fr;
      }

      .chat-title {
        font-size: 1.8rem;
      }

      .message-bubble {
        max-width: 90%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="top-link">
      <a id="admin-user-link" href="#">管理者さん</a>
    </p>

    <h1>お問い合わせ詳細</h1>

    <p class="center-link">
      <a href="user-inquiries.html">戻る</a>
    </p>

    <div id="load-error-box" class="alert-box hidden">読み込みに失敗しました。</div>

    <div class="box">
      <h2>概要</h2>
      <div class="summary-grid">
        <div class="summary-item">
          <div class="summary-label">ユーザー名</div>
          <div class="summary-value" id="summary-username">読み込み中...</div>
        </div>
        <div class="summary-item">
          <div class="summary-label">状態</div>
          <div class="summary-value" id="summary-status">読み込み中...</div>
        </div>
        <div class="summary-item">
          <div class="summary-label">主担当</div>
          <div class="summary-value" id="summary-primary">読み込み中...</div>
        </div>
        <div class="summary-item">
          <div class="summary-label">申請日時</div>
          <div class="summary-value" id="summary-created-at">読み込み中...</div>
        </div>
      </div>
    </div>

    <div class="chat-shell">
      <h2 class="chat-title">お問い合わせ</h2>
      <div class="chat-status" id="chat-status-text">読み込み中...</div>

      <div class="chat-log-wrap" id="chat-log-wrap">
        <div class="chat-empty">読み込み中...</div>
      </div>

      <div id="reply-box" class="reply-box hidden">
        <p>ここからユーザーへ返信します。</p>
        <textarea id="reply-text" placeholder="返信内容を入力してください"></textarea>
        <button type="button" class="primary-button" id="reply-send-button">返信を送信</button>
      </div>
    </div>

    <div id="manage-box" class="box hidden">
      <h2>担当者管理</h2>
      <div class="manage-grid">
        <div class="manage-card">
          <h3>現在の担当者</h3>
          <div class="current-assignees" id="current-assignees">読み込み中...</div>
        </div>

        <div class="manage-card">
          <h3>主担当変更</h3>
          <select id="primary-select"></select>
          <button type="button" class="secondary-button" id="change-primary-button">主担当を変更</button>
        </div>

        <div class="manage-card hidden" id="add-assignee-card">
          <h3>担当追加</h3>
          <select id="candidate-select"></select>
          <button type="button" class="primary-button" id="add-assignee-button">担当者を追加</button>
        </div>
      </div>
    </div>

    <p class="center-link">
      <a href="user-inquiries.html">戻る</a>
    </p>

    <details>
      <summary>通信結果</summary>
      <pre id="debug-box">読み込み中...</pre>
    </details>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const supabaseUrl = "https://ndtxjdhvdedflyqgpizr.supabase.co";
      const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kdHhqZGh2ZGVkZmx5cWdwaXpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjM0MjIsImV4cCI6MjA4OTIzOTQyMn0.IVDQg_I0VeBzE2z7gXiS5p1Ci4k620qYgZSXjyenyb4";

      const VIEW_FUNCTION = "admin-get-support-inquiry-detail-v2";
      const MANAGE_FUNCTION = "admin-manage-support-inquiry-assignees";
      const REPLY_FUNCTION = "admin-send-support-inquiry-reply-v2";

      const adminUserLink = document.getElementById("admin-user-link");
      const debugBox = document.getElementById("debug-box");
      const loadErrorBox = document.getElementById("load-error-box");

      const summaryUsername = document.getElementById("summary-username");
      const summaryStatus = document.getElementById("summary-status");
      const summaryPrimary = document.getElementById("summary-primary");
      const summaryCreatedAt = document.getElementById("summary-created-at");

      const chatStatusText = document.getElementById("chat-status-text");
      const chatLogWrap = document.getElementById("chat-log-wrap");

      const replyBox = document.getElementById("reply-box");
      const replyText = document.getElementById("reply-text");
      const replySendButton = document.getElementById("reply-send-button");

      const manageBox = document.getElementById("manage-box");
      const currentAssignees = document.getElementById("current-assignees");
      const primarySelect = document.getElementById("primary-select");
      const changePrimaryButton = document.getElementById("change-primary-button");
      const addAssigneeCard = document.getElementById("add-assignee-card");
      const candidateSelect = document.getElementById("candidate-select");
      const addAssigneeButton = document.getElementById("add-assignee-button");

      const params = new URLSearchParams(window.location.search);
      const inquiryId = Number(params.get("inquiry_id"));
      const mode = params.get("mode") || "detail";

      const adminLoggedIn = sessionStorage.getItem("admin_logged_in");
      const adminUsername = sessionStorage.getItem("admin_username") || "管理者";
      const adminId = sessionStorage.getItem("admin_id") || "";
      const adminRole = sessionStorage.getItem("admin_role") || "";
      const adminStatus = sessionStorage.getItem("admin_status") || "";

      adminUserLink.textContent = adminUsername + "さん";

      function renderDebug(extra = "") {
        debugBox.textContent =
          "admin_username: " + adminUsername + "\n" +
          "admin_id: " + adminId + "\n" +
          "admin_role: " + adminRole + "\n" +
          "admin_status: " + adminStatus + "\n" +
          "inquiry_id: " + inquiryId + "\n" +
          "mode: " + mode +
          (extra ? "\n\n" + extra : "");
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function formatDate(value) {
        if (!value) return "なし";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return String(value);
        return date.toLocaleString("ja-JP");
      }

      function statusLabel(status) {
        if (status === "open") return "未対応";
        if (status === "in_progress") return "対応中";
        if (status === "resolved") return "解決済み";
        return status || "不明";
      }

      function setLoadError(message) {
        loadErrorBox.textContent = message || "読み込みに失敗しました。";
        loadErrorBox.classList.remove("hidden");
      }

      async function callFunction(functionName, payload) {
        const response = await fetch(`${supabaseUrl}/functions/v1/${functionName}`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": supabaseKey,
            "Authorization": `Bearer ${supabaseKey}`
          },
          body: JSON.stringify(payload || {})
        });

        const rawText = await response.text();
        let result = null;

        try {
          result = rawText ? JSON.parse(rawText) : {};
        } catch {
          throw new Error(`レスポンス解析失敗: ${functionName}\n${rawText}`);
        }

        renderDebug(
          "function: " + functionName +
          "\nstatus: " + response.status +
          "\npayload:\n" + JSON.stringify(payload, null, 2) +
          "\nresponse:\n" + JSON.stringify(result, null, 2)
        );

        if (!response.ok || result?.ok === false) {
          throw new Error(result?.error || `${functionName} の実行に失敗しました。`);
        }

        return result;
      }

      function getMessageRowsFromResponse(detailData) {
        const currentMessages = Array.isArray(detailData?.messages) ? detailData.messages : [];
        const historyBlocks = Array.isArray(detailData?.past_inquiries) ? detailData.past_inquiries : [];
        const historyMessages = [];

        historyBlocks.forEach((item) => {
          const rows = Array.isArray(item?.messages) ? item.messages : [];
          rows.forEach((row) => {
            historyMessages.push({
              ...row,
              from_past: true,
              inquiry_id: item?.id || row?.inquiry_id || null
            });
          });
        });

        const merged = [...historyMessages, ...currentMessages];

        merged.sort((a, b) => {
          const ta = new Date(a?.created_at || 0).getTime();
          const tb = new Date(b?.created_at || 0).getTime();
          return ta - tb;
        });

        return merged;
      }

      function renderMessages(detailData) {
        const allMessages = getMessageRowsFromResponse(detailData);

        if (!allMessages.length) {
          chatLogWrap.innerHTML = `<div class="chat-empty">現在ありません</div>`;
          return;
        }

        const parts = [];
        let lastDay = "";

        allMessages.forEach((msg) => {
          const created = msg?.created_at ? new Date(msg.created_at) : null;
          const dayKey = created && !Number.isNaN(created.getTime())
            ? created.toLocaleDateString("ja-JP")
            : "日付不明";

          if (dayKey !== lastDay) {
            parts.push(`<div class="day-divider">${escapeHtml(dayKey)}</div>`);
            lastDay = dayKey;
          }

          const senderType = msg?.sender_type || "user";
          const rowClass =
            senderType === "user"
              ? "user"
              : (senderType === "admin" || senderType === "sub_admin" ? senderType : "admin");

          const senderName =
            msg?.sender_name ||
            msg?.admin_name ||
            (senderType === "user" ? "ユーザー" : "運営");

          const timeText = created && !Number.isNaN(created.getTime())
            ? created.toLocaleString("ja-JP")
            : "";

          parts.push(`
            <div class="message-row ${escapeHtml(rowClass)}">
              <div class="message-bubble">
                <div class="message-meta">${escapeHtml(senderName)} / ${escapeHtml(timeText)}</div>
                <div class="message-text">${escapeHtml(msg?.message || "")}</div>
              </div>
            </div>
          `);
        });

        chatLogWrap.innerHTML = parts.join("");
        chatLogWrap.scrollTop = chatLogWrap.scrollHeight;
      }

      function renderSummary(detailData) {
        const inquiry = detailData?.inquiry || detailData || {};
        const primaryName =
          inquiry?.assigned_admin_username ||
          detailData?.primary_assignee?.username ||
          "なし";

        summaryUsername.textContent =
          inquiry?.user_name ||
          inquiry?.username ||
          detailData?.user_name ||
          "なし";

        summaryStatus.textContent = statusLabel(
          inquiry?.status || detailData?.status || ""
        );

        summaryPrimary.textContent = primaryName;
        summaryCreatedAt.textContent = formatDate(
          inquiry?.created_at || detailData?.created_at || ""
        );

        chatStatusText.textContent =
          `状態: ${statusLabel(inquiry?.status || detailData?.status || "")} / 主担当: ${primaryName}`;
      }

      function renderAssigneeArea(detailData, candidatesData) {
        const assignees = Array.isArray(detailData?.assignees) ? detailData.assignees : [];
        const inquiry = detailData?.inquiry || detailData || {};

        if (!assignees.length) {
          currentAssignees.textContent = "現在ありません";
        } else {
          currentAssignees.textContent = assignees
            .map((item) => {
              const name = item?.username || item?.admin_username || "不明";
              const role = item?.role || item?.admin_role || "";
              const primary = item?.is_primary ? "（主担当）" : "";
              return `${name}${role ? " / " + role : ""}${primary}`;
            })
            .join("\n");
        }

        primarySelect.innerHTML = "";
        assignees.forEach((item) => {
          const option = document.createElement("option");
          option.value = String(item?.admin_account_id || item?.id || "");
          option.textContent =
            (item?.username || item?.admin_username || "不明") +
            (item?.is_primary ? "（現在の主担当）" : "");
          primarySelect.appendChild(option);
        });

        const candidateRows = Array.isArray(candidatesData?.candidates) ? candidatesData.candidates : [];
        candidateSelect.innerHTML = "";

        if (!candidateRows.length) {
          const option = document.createElement("option");
          option.value = "";
          option.textContent = "現在ありません";
          candidateSelect.appendChild(option);
        } else {
          candidateRows.forEach((item) => {
            const option = document.createElement("option");
            option.value = String(item?.id || "");
            option.textContent = `${item?.username || "不明"} / ${item?.role || ""}`;
            candidateSelect.appendChild(option);
          });
        }
      }

      async function loadAll() {
        const detailData = await callFunction(VIEW_FUNCTION, {
          admin_id: Number(adminId),
          inquiry_id: inquiryId,
          mode: mode
        });

        renderSummary(detailData);
        renderMessages(detailData);

        let candidatesData = { candidates: [] };

        if (mode === "detail") {
          candidatesData = await callFunction(MANAGE_FUNCTION, {
            mode: "candidates",
            admin_id: Number(adminId),
            inquiry_id: inquiryId
          });
        }

        renderAssigneeArea(detailData, candidatesData);
      }

      async function sendReply() {
        const message = replyText.value.trim();
        if (!message) {
          alert("返信内容を入力してください。");
          return;
        }

        await callFunction(REPLY_FUNCTION, {
          admin_id: Number(adminId),
          inquiry_id: inquiryId,
          message: message
        });

        replyText.value = "";
        await loadAll();
        alert("返信を送信しました。");
      }

      async function addAssignee() {
        const targetId = Number(candidateSelect.value);
        if (!targetId) {
          alert("追加する担当者を選択してください。");
          return;
        }

        await callFunction(MANAGE_FUNCTION, {
          mode: "add",
          admin_id: Number(adminId),
          inquiry_id: inquiryId,
          target_admin_account_id: targetId,
          make_primary: false
        });

        await loadAll();
        alert("担当者を追加しました。");
      }

      async function changePrimary() {
        const targetId = Number(primarySelect.value);
        if (!targetId) {
          alert("主担当にする担当者を選択してください。");
          return;
        }

        await callFunction(MANAGE_FUNCTION, {
          mode: "add",
          admin_id: Number(adminId),
          inquiry_id: inquiryId,
          target_admin_account_id: targetId,
          make_primary: true
        });

        await loadAll();
        alert("主担当を変更しました。");
      }

      try {
        if (adminLoggedIn !== "1") {
          window.location.href = "admin-login.html";
          return;
        }

        if (adminStatus !== "active") {
          alert("この管理者アカウントは停止中です。");
          window.location.href = "admin-login.html";
          return;
        }

        if (!inquiryId || Number.isNaN(inquiryId)) {
          setLoadError("対象のお問い合わせがありません。");
          renderDebug("inquiry_id が不正");
          return;
        }

        if (mode !== "detail" && mode !== "attend") {
          setLoadError("mode が不正です。");
          renderDebug("mode が不正");
          return;
        }

        // mode別UI
        manageBox.classList.remove("hidden");
        if (mode === "detail") {
          replyBox.classList.add("hidden");
          addAssigneeCard.classList.remove("hidden");
        } else {
          replyBox.classList.remove("hidden");
          addAssigneeCard.classList.add("hidden");
        }

        replySendButton.addEventListener("click", sendReply);
        addAssigneeButton.addEventListener("click", addAssignee);
        changePrimaryButton.addEventListener("click", changePrimary);

        await loadAll();
      } catch (error) {
        console.error(error);
        setLoadError("読み込みに失敗しました。");
        chatStatusText.textContent = "読み込みに失敗しました。";
        chatLogWrap.innerHTML = `<div class="chat-empty">現在ありません</div>`;
        currentAssignees.textContent = "現在ありません";
        renderDebug(String(error));
      }
    });
  </script>
</body>
</html>
