<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>音楽ライセンス申請</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: linear-gradient(to bottom, #0b1026 0%, #1a2342 45%, #2f3d68 100%);
      color: #f5f5f5;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 24px;
      font-size: 2.4rem;
      line-height: 1.4;
    }

    a {
      color: #f2d9e8;
      text-decoration: none;
    }

    a:hover {
      color: #ffe7f3;
      text-decoration: underline;
    }

    .box {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.25);
      padding: 24px;
      margin-bottom: 20px;
    }

    .box p {
      margin: 12px 0;
      line-height: 1.8;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input,
    select,
    button {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      display: block;
      box-sizing: border-box;
      padding: 10px;
      font-size: 16px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.95);
      color: #222;
      font-family: inherit;
    }

    button {
      border: none;
      background-color: #7a5c61;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background-color: #9a747b;
    }

    .center-link {
      text-align: center;
      margin-top: 16px;
    }

    details {
      margin-top: 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.25);
      padding: 12px;
    }

    summary {
      cursor: pointer;
      font-weight: bold;
      color: #f5f5f5;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 12px 0 0 0;
      font-size: 14px;
      color: #f5f5f5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>音楽ライセンス申請</h1>

    <div class="box">
      <p>現在の音楽ライセンス状況: <span id="current-license">読み込み中...</span></p>
    </div>

    <div class="box">
      <form id="music-license-form">
        <p>
          <label for="requested-license">申請ライセンス</label>
          <select id="requested-license" required>
            <option value="">選択してください</option>
            <option value="license_a">ライセンスA</option>
            <option value="license_b">ライセンスB</option>
          </select>
        </p>

        <p>
          <label for="note-account-name">noteアカウント名</label>
          <input type="text" id="note-account-name" required>
        </p>

        <p>
          <label for="license-user-name">ライセンス使用者名</label>
          <input type="text" id="license-user-name" required>
        </p>

        <p>
          <button type="submit" id="submit-button">送信</button>
        </p>
      </form>

      <p class="center-link">
        <a href="user-applications.html">戻る</a>
      </p>
    </div>

    <details>
      <summary>通信結果</summary>
      <pre id="debug-box">読み込み中...</pre>
    </details>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const debugBox = document.getElementById("debug-box");
      const currentLicense = document.getElementById("current-license");
      const form = document.getElementById("music-license-form");
      const submitButton = document.getElementById("submit-button");

      function renderDebug(extra = "") {
        debugBox.textContent = extra || "待機中";
      }

      if (!window.supabase || typeof window.supabase.createClient !== "function") {
        alert("Supabase の読み込みに失敗しました。");
        renderDebug("Supabase の読み込みに失敗しました。");
        return;
      }

      const supabaseUrl = "https://ndtxjdhvdedflyqgpizr.supabase.co";
      const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kdHhqZGh2ZGVkZmx5cWdwaXpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjM0MjIsImV4cCI6MjA4OTIzOTQyMn0.IVDQg_I0VeBzE2z7gXiS5p1Ci4k620qYgZSXjyenyb4";
      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

      const {
        data: { session },
      } = await supabase.auth.getSession();

      if (!session) {
        alert("ログインが必要です。");
        window.location.href = "login.html?redirect=" + encodeURIComponent("application-music-license.html");
        return;
      }

      const { data: account, error: accountError } = await supabase
        .from("accounts")
        .select("license_status")
        .eq("user_id", session.user.id)
        .maybeSingle();

      if (accountError) {
        currentLicense.textContent = "取得失敗";
        renderDebug("accounts取得失敗: " + accountError.message);
      } else {
        currentLicense.textContent = account?.license_status || "無し";
        renderDebug("初期表示成功");
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const requestedLicense = document.getElementById("requested-license").value;
        const noteAccountName = document.getElementById("note-account-name").value.trim();
        const licenseUserName = document.getElementById("license-user-name").value.trim();

        if (!requestedLicense || !noteAccountName || !licenseUserName) {
          alert("必要項目を入力してください。");
          return;
        }

        submitButton.disabled = true;
        submitButton.textContent = "送信中...";

        try {
          const accessToken = session.access_token;

          const response = await fetch(`${supabaseUrl}/functions/v1/submit-music-license-application`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "apikey": supabaseKey,
              "Authorization": "Bearer " + accessToken
            },
            body: JSON.stringify({
              requested_license: requestedLicense,
              note_account_name: noteAccountName,
              license_user_name: licenseUserName
            })
          });

          const rawText = await response.text();
          let result = null;

          try {
            result = rawText ? JSON.parse(rawText) : {};
          } catch (_) {
            renderDebug("レスポンス解析失敗\n\nstatus=" + response.status + "\n\n" + rawText);
            alert("送信に失敗しました。");
            submitButton.disabled = false;
            submitButton.textContent = "送信";
            return;
          }

          renderDebug(
            "status=" + response.status + "\n\n" +
            JSON.stringify(result, null, 2)
          );

          if (!response.ok || !result || !result.ok) {
            alert(result?.error || "送信に失敗しました。");
            submitButton.disabled = false;
            submitButton.textContent = "送信";
            return;
          }

          alert("音楽ライセンス申請を送信しました。");
          form.reset();
        } catch (error) {
          renderDebug("fetch error\n\n" + String(error));
          alert("送信に失敗しました。");
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = "送信";
        }
      });
    });
  </script>
</body>
</html>
