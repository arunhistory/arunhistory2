<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>アカウント情報変更</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: linear-gradient(to bottom, #0b1026 0%, #1a2342 45%, #2f3d68 100%);
      color: #f5f5f5;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-top: 0;
      font-size: 2.5rem;
      line-height: 1.4;
    }

    a {
      color: #f2d9e8;
      text-decoration: none;
    }

    a:hover {
      color: #ffe7f3;
      text-decoration: none;
    }

    .box {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.25);
      padding: 24px;
    }

    .box p {
      margin: 0 0 16px 0;
      line-height: 1.8;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input,
    select,
    button {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      display: block;
      box-sizing: border-box;
      font-size: 16px;
      font-family: inherit;
    }

    input,
    select {
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.95);
      color: #222;
    }

    input[disabled] {
      background: rgba(220,220,220,0.9);
      color: #555;
    }

    button {
      padding: 12px;
      border: none;
      background-color: #7a5c61;
      color: #fff;
      cursor: pointer;
    }

    button:hover {
      background-color: #9a747b;
    }
  </style>
</head>
<body>
  <div class="container">
    <p id="username-line" style="text-align: left; margin-top: 0;">ユーザーさん</p>

    <h1>アカウント情報変更</h1>

    <div class="box">
      <form id="account-edit-form">
        <p>
          <label for="email">メールアドレス</label>
          <input type="email" id="email" disabled>
        </p>

        <p>
          <label for="display-name">ユーザー名</label>
          <input type="text" id="display-name">
        </p>

        <p>
          <label for="birthdate">生年月日</label>
          <input type="date" id="birthdate" disabled>
        </p>

        <p>
          <label for="gender">性別</label>
          <select id="gender">
            <option value="">選択してください</option>
            <option value="男性">男性</option>
            <option value="女性">女性</option>
            <option value="不明">不明</option>
            <option value="未回答">未回答</option>
          </select>
        </p>

        <p>
          <label for="country">国</label>
          <input type="text" id="country">
        </p>

        <p>
          <button type="submit">変更する</button>
        </p>
      </form>

      <p><a href="account-info.html">アカウント情報へ戻る</a></p>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const usernameLine = document.getElementById("username-line");
      const form = document.getElementById("account-edit-form");
      const submitButton = form.querySelector('button[type="submit"]');

      if (!window.supabase || typeof window.supabase.createClient !== "function") {
        alert("Supabase の読み込みに失敗しました。");
        return;
      }

      const supabaseUrl = "https://ndtxjdhvdedflyqgpizr.supabase.co";
      const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kdHhqZGh2ZGVkZmx5cWdwaXpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjM0MjIsImV4cCI6MjA4OTIzOTQyMn0.IVDQg_I0VeBzE2z7gXiS5p1Ci4k620qYgZSXjyenyb4";
      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

      if (sessionStorage.getItem("admin_logged_in") !== "1") {
        const { data: maintenanceSetting, error: maintenanceError } = await supabase
          .from("site_settings")
          .select("setting_value")
          .eq("setting_key", "maintenance_mode")
          .maybeSingle();

        if (!maintenanceError && maintenanceSetting?.setting_value === "on") {
          window.location.href = "maintenance.html";
          return;
        }
      }

      const { data: userData } = await supabase.auth.getUser();
      const user = userData?.user;

      if (!user) {
        window.location.href = "login.html?redirect=account-edit.html";
        return;
      }

      const { data: account, error } = await supabase
        .from("accounts")
        .select("email, display_name, birthdate, gender, country")
        .eq("user_id", user.id)
        .maybeSingle();

      if (error) {
        alert("アカウント情報の取得に失敗しました。");
        return;
      }

      const displayName =
        account?.display_name ||
        user.user_metadata?.username ||
        "ユーザー";

      usernameLine.textContent = displayName + "さん";

      document.getElementById("email").value = account?.email || user.email || "";
      document.getElementById("display-name").value = account?.display_name || "";
      document.getElementById("birthdate").value = account?.birthdate || "";
      document.getElementById("gender").value = account?.gender || "";
      document.getElementById("country").value = account?.country || "";

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        submitButton.disabled = true;
        submitButton.textContent = "変更中...";

        try {
          const newDisplayName = document.getElementById("display-name").value.trim();
          const newGender = document.getElementById("gender").value;
          const newCountry = document.getElementById("country").value.trim();

          const { error: updateError } = await supabase
            .from("accounts")
            .update({
              display_name: newDisplayName,
              gender: newGender,
              country: newCountry
            })
            .eq("user_id", user.id);

          if (updateError) {
            alert("変更に失敗しました: " + updateError.message);
            return;
          }

          alert("変更しました");
          window.location.href = "account-info.html";
        } catch (err) {
          alert("予期しないエラーが発生しました。");
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = "変更する";
        }
      });
    });
  </script>
</body>
</html>
