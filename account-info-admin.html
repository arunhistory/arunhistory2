<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>アカウント情報</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: linear-gradient(to bottom, #dff5e3 0%, #c7ebcf 45%, #aedfb9 100%);
      color: #111;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    h1, h2 {
      text-align: center;
      margin-top: 0;
      color: #111;
      line-height: 1.4;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    a {
      color: #111;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .box {
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(0,0,0,0.15);
      padding: 24px;
      margin-bottom: 20px;
    }

    .field {
      margin-bottom: 16px;
    }

    .label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input,
    select,
    button {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      box-sizing: border-box;
      font-size: 16px;
      font-family: inherit;
    }

    input,
    select {
      display: block;
      padding: 10px;
      border: 1px solid rgba(0,0,0,0.2);
      background: #fff;
      color: #111;
    }

    button {
      padding: 12px;
      border: none;
      background-color: #4f8f5b;
      color: #111;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }

    button:hover {
      background-color: #6aa676;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .sort-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .sort-row-half {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .sort-grid button,
    .sort-row-half button {
      margin-top: 0;
    }

    .account-item {
      padding: 14px 0;
      border-bottom: 1px solid rgba(0,0,0,0.12);
    }

    .account-item:last-child {
      border-bottom: none;
    }

    .account-link {
      display: block;
      color: #111;
      text-decoration: none;
    }

    .account-link:hover {
      text-decoration: underline;
    }

    .account-title {
      font-weight: bold;
      font-size: 1.08rem;
      margin-bottom: 6px;
    }

    .account-meta {
      white-space: pre-wrap;
      line-height: 1.8;
      color: #222;
    }

    .center-link {
      text-align: center;
      margin-top: 16px;
    }

    .show-all-link {
      text-align: center;
      margin-top: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    .show-all-link button {
      background: none;
      border: none;
      color: #111;
      padding: 0;
      margin: 0;
      font-weight: bold;
      font-size: 1.15rem;
    }

    .show-all-link button:hover {
      text-decoration: underline;
      background: none;
    }

    details {
      margin-top: 20px;
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(0,0,0,0.12);
      padding: 12px;
    }

    summary {
      cursor: pointer;
      font-weight: bold;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 12px 0 0 0;
      font-size: 14px;
    }

    @media (max-width: 700px) {
      .filter-grid,
      .sort-grid,
      .sort-row-half {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <p style="text-align:left; margin-top:0;">
      <a id="admin-user-link" href="#">管理者さん</a>
    </p>

    <h1>アカウント情報</h1>

    <div class="box">
      <div class="filter-grid">
        <div class="field">
          <label class="label" for="filter-email">メールアドレス</label>
          <input type="text" id="filter-email" placeholder="部分一致で検索">
        </div>

        <div class="field">
          <label class="label" for="filter-name">ユーザー名</label>
          <input type="text" id="filter-name" placeholder="部分一致で検索">
        </div>

        <div class="field">
          <label class="label" for="filter-gender">性別【選択式】</label>
          <select id="filter-gender">
            <option value="">指定なし</option>
            <option value="男性">男性</option>
            <option value="女性">女性</option>
            <option value="その他">その他</option>
            <option value="未回答">未回答</option>
          </select>
        </div>

        <div class="field">
          <label class="label" for="filter-novel-support">小説応援【選択式】</label>
          <select id="filter-novel-support">
            <option value="">指定なし</option>
            <option value="なし">なし</option>
            <option value="観測者">観測者</option>
            <option value="支援者">支援者</option>
            <option value="記録者">記録者</option>
            <option value="特別支援者">特別支援者</option>
          </select>
        </div>

        <div class="field">
          <label class="label" for="filter-license">音楽ライセンス【選択式】</label>
          <select id="filter-license">
            <option value="">指定なし</option>
            <option value="無し">無し</option>
            <option value="ライセンスA">ライセンスA</option>
            <option value="ライセンスB">ライセンスB</option>
          </select>
        </div>

        <div class="field">
          <label class="label" for="filter-country">国</label>
          <input type="text" id="filter-country" placeholder="部分一致で検索">
        </div>
      </div>

      <button type="button" id="filter-button">絞り込む</button>

      <div class="sort-grid">
        <button type="button" id="sort-email-button">メールアドレス順</button>
        <button type="button" id="sort-name-button">ユーザー名順</button>
      </div>

      <div class="sort-row-half">
        <button type="button" id="sort-created-button">登録順</button>
        <button type="button" id="sort-direction-button">▼</button>
      </div>
    </div>

    <div class="box">
      <h2>一覧</h2>
      <div id="account-list">
        <p>読み込み中...</p>
      </div>

      <div class="show-all-link">
        <button type="button" id="all-button">━━全てを表示━━</button>
      </div>

      <p class="center-link">
        <a href="account-management.html">戻る</a>
      </p>
    </div>

    <details>
      <summary>通信結果</summary>
      <pre id="debug-box">読み込み中...</pre>
    </details>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      if (sessionStorage.getItem("admin_logged_in") !== "1") {
        window.location.href = "admin-login.html";
        return;
      }

      const adminUsername = sessionStorage.getItem("admin_username") || "管理者";
      const adminId = sessionStorage.getItem("admin_id");
      const adminRole = sessionStorage.getItem("admin_role") || "";
      const adminStatus = sessionStorage.getItem("admin_status") || "";

      let adminPermissions = [];
      try {
        adminPermissions = JSON.parse(sessionStorage.getItem("admin_permissions") || "[]");
        if (!Array.isArray(adminPermissions)) adminPermissions = [];
      } catch {
        adminPermissions = [];
      }

      const adminUserLink = document.getElementById("admin-user-link");
      const debugBox = document.getElementById("debug-box");
      const accountList = document.getElementById("account-list");

      adminUserLink.textContent = adminUsername + "さん";

      function clearAdminSession() {
        sessionStorage.removeItem("admin_logged_in");
        sessionStorage.removeItem("admin_username");
        sessionStorage.removeItem("admin_id");
        sessionStorage.removeItem("admin_role");
        sessionStorage.removeItem("admin_status");
        sessionStorage.removeItem("admin_permissions");
      }

      function renderDebug(extra = "") {
        debugBox.textContent =
          "admin_username: " + adminUsername + "\n" +
          "admin_id: " + (adminId || "") + "\n" +
          "admin_role: " + adminRole + "\n" +
          "admin_status: " + adminStatus + "\n" +
          "admin_permissions: " + JSON.stringify(adminPermissions, null, 2) +
          (extra ? "\n\n" + extra : "");
      }

      if (adminStatus !== "active") {
        alert("この管理者アカウントは停止中です。");
        clearAdminSession();
        window.location.href = "admin-login.html";
        return;
      }

      const supabaseUrl = "https://ndtxjdhvdedflyqgpizr.supabase.co";
      const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kdHhqZGh2ZGVkZmx5cWdwaXpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjM0MjIsImV4cCI6MjA4OTIzOTQyMn0.IVDQg_I0VeBzE2z7gXiS5p1Ci4k620qYgZSXjyenyb4";

      async function writePageLog(actionType, actionLabel, actionDetail) {
        const response = await fetch(`${supabaseUrl}/functions/v1/admin-write-log`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": supabaseKey,
            "Authorization": "Bearer " + supabaseKey
          },
          body: JSON.stringify({
            admin_username: adminUsername,
            target_type: adminRole === "sub_admin" ? "sub_admin" : null,
            target_id: adminRole === "sub_admin" ? adminId : null,
            action_type: actionType,
            action_label: actionLabel,
            action_detail: actionDetail
          })
        });

        const rawText = await response.text();

        renderDebug(
          "log status: " + response.status +
          "\nlog response:\n" + rawText
        );

        return response.ok;
      }

      const canUseAccountInfoAdmin =
        adminRole === "admin" ||
        (adminRole === "sub_admin" && adminPermissions.includes("account_management"));

      if (!canUseAccountInfoAdmin) {
        try {
          await writePageLog(
            "admin_forbidden_page_access",
            "権限外ページアクセス",
            "page: account-info-admin.html / reason: account_management権限なし"
          );
        } catch (error) {
          renderDebug("拒否ログ保存失敗: " + String(error));
        }

        alert("この機能を使う権限がありません。");
        window.location.href = "admin-home.html";
        return;
      }

      try {
        await writePageLog(
          "account_info_admin_view",
          "アカウント情報閲覧",
          `page: account-info-admin.html / role: ${adminRole}`
        );
      } catch (error) {
        renderDebug("閲覧ログ保存失敗: " + String(error));
      }

      if (!window.supabase || typeof window.supabase.createClient !== "function") {
        alert("Supabase の読み込みに失敗しました。");
        return;
      }

      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

      const state = {
        sortKey: "created_at",
        sortAsc: false,
        showAll: false
      };

      function renderAccounts(items) {
        accountList.innerHTML = "";

        if (!items || items.length === 0) {
          accountList.innerHTML = "<p>該当するアカウントはありません。</p>";
          return;
        }

        items.forEach((item) => {
          const row = document.createElement("div");
          row.className = "account-item";

          const link = document.createElement("a");
          link.className = "account-link";
          link.href = "user-detail.html?id=" + encodeURIComponent(item.user_id);

          const title = document.createElement("div");
          title.className = "account-title";
          title.textContent = (item.display_name || "名前未設定") + " / " + (item.email || "メール未設定");

          const meta = document.createElement("div");
          meta.className = "account-meta";
          meta.textContent =
            "メールアドレス: " + (item.email || "") + "\n" +
            "ユーザー名: " + (item.display_name || "") + "\n" +
            "性別: " + (item.gender || "") + "\n" +
            "小説応援: " + (item.novel_support_status || "") + "\n" +
            "音楽ライセンス: " + (item.license_status || "") + "\n" +
            "国: " + (item.country || "") + "\n" +
            "登録日時: " + (item.created_at ? new Date(item.created_at).toLocaleString("ja-JP") : "");

          link.appendChild(title);
          link.appendChild(meta);
          row.appendChild(link);
          accountList.appendChild(row);
        });
      }

      async function loadAccounts() {
        accountList.innerHTML = "<p>読み込み中...</p>";

        const filterEmail = document.getElementById("filter-email").value.trim();
        const filterName = document.getElementById("filter-name").value.trim();
        const filterGender = document.getElementById("filter-gender").value;
        const filterNovelSupport = document.getElementById("filter-novel-support").value;
        const filterLicense = document.getElementById("filter-license").value;
        const filterCountry = document.getElementById("filter-country").value.trim();

        let query = supabase
          .from("accounts")
          .select("id, user_id, display_name, email, gender, country, created_at, license_status, novel_support_status");

        if (filterEmail !== "") {
          query = query.ilike("email", "%" + filterEmail + "%");
        }

        if (filterName !== "") {
          query = query.ilike("display_name", "%" + filterName + "%");
        }

        if (filterGender !== "") {
          query = query.eq("gender", filterGender);
        }

        if (filterNovelSupport !== "") {
          query = query.eq("novel_support_status", filterNovelSupport);
        }

        if (filterLicense !== "") {
          query = query.eq("license_status", filterLicense);
        }

        if (filterCountry !== "") {
          query = query.ilike("country", "%" + filterCountry + "%");
        }

        query = query.order(state.sortKey, { ascending: state.sortAsc });

        if (!state.showAll) {
          query = query.limit(20);
        }

        const { data, error } = await query;

        if (error) {
          accountList.innerHTML = "<p>読み込みに失敗しました。</p>";
          renderDebug("一覧取得エラー: " + error.message);
          return;
        }

        renderAccounts(data || []);
        renderDebug(
          "取得件数: " + (data || []).length + "\n" +
          "sortKey: " + state.sortKey + "\n" +
          "sortAsc: " + state.sortAsc + "\n" +
          "showAll: " + state.showAll
        );
      }

      document.getElementById("filter-button").addEventListener("click", async () => {
        state.showAll = false;
        await loadAccounts();
      });

      document.getElementById("sort-email-button").addEventListener("click", async () => {
        state.sortKey = "email";
        await loadAccounts();
      });

      document.getElementById("sort-name-button").addEventListener("click", async () => {
        state.sortKey = "display_name";
        await loadAccounts();
      });

      document.getElementById("sort-created-button").addEventListener("click", async () => {
        state.sortKey = "created_at";
        await loadAccounts();
      });

      document.getElementById("sort-direction-button").addEventListener("click", async (e) => {
        state.sortAsc = !state.sortAsc;
        e.target.textContent = state.sortAsc ? "▲" : "▼";
        await loadAccounts();
      });

      document.getElementById("all-button").addEventListener("click", async () => {
        state.showAll = true;
        await loadAccounts();
      });

      await loadAccounts();
    });
  </script>
</body>
</html>
