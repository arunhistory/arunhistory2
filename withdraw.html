<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>退会申請</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: linear-gradient(to bottom, #0b1026 0%, #1a2342 45%, #2f3d68 100%);
      color: #f5f5f5;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-top: 0;
      font-size: 2.5rem;
      line-height: 1.4;
    }

    a {
      color: #f2d9e8;
      text-decoration: none;
    }

    a:hover {
      color: #ffe7f3;
      text-decoration: none;
    }

    .box {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.25);
      padding: 24px;
    }

    .box p {
      margin: 0 0 16px 0;
      line-height: 1.8;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      display: block;
      box-sizing: border-box;
      font-size: 16px;
      font-family: inherit;
    }

    input,
    select,
    textarea {
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.95);
      color: #222;
    }

    input[disabled] {
      background: rgba(220,220,220,0.9);
      color: #555;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      padding: 12px;
      border: none;
      background-color: #7a5c61;
      color: #fff;
      cursor: pointer;
    }

    button:hover {
      background-color: #9a747b;
    }

    .agree-box {
      margin: 16px 0;
    }

    .agree-box label {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-weight: normal;
      line-height: 1.8;
      margin-bottom: 10px;
    }

    .agree-box input[type="checkbox"] {
      width: auto;
      min-width: auto;
      max-width: none;
      display: inline-block;
      margin-top: 5px;
      padding: 0;
    }

    .hidden {
      display: none;
    }

    .notice {
      margin-bottom: 20px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.08);
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <p id="username-line" style="text-align: left; margin-top: 0;">ユーザーさん</p>

    <h1>退会申請</h1>

    <div class="box">
      <p class="notice">
        メールアドレス・パスワードは2週間保持され、2週間以内にログインが無ければ削除されます。<br>
        2週間以内にログインがあった場合、退会申請は取り消しとなります。
      </p>

      <form id="withdraw-form">
        <p>
          <label for="email">メールアドレス</label>
          <input type="email" id="email" disabled>
        </p>

        <p>
          <label for="username">ユーザー名</label>
          <input type="text" id="username" disabled>
        </p>

        <p>
          <label for="reason-category">退会理由</label>
          <select id="reason-category" required>
            <option value="">選択してください</option>
            <option value="使わなくなった">使わなくなった</option>
            <option value="他のものを利用するから">他のものを利用するから</option>
            <option value="サイトが気に入らなかった">サイトが気に入らなかった</option>
            <option value="小説が面白くなかった">小説が面白くなかった</option>
            <option value="音楽が気に入らなかった">音楽が気に入らなかった</option>
            <option value="料金を払うのが嫌になった">料金を払うのが嫌になった</option>
            <option value="その他">その他</option>
          </select>
        </p>

        <p id="other-reason-wrap" class="hidden">
          <label for="reason-text">理由</label>
          <textarea id="reason-text"></textarea>
        </p>

        <div class="agree-box">
          <label for="agree-privacy">
            <input type="checkbox" id="agree-privacy" name="agree-privacy">
            <span><a href="privacy-policy.html" target="_blank">プライバシーポリシー</a>に同意します</span>
          </label>
        </div>

        <p>
          <button type="submit">退会</button>
        </p>
      </form>

      <p><a href="mypage.html">戻る</a></p>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const usernameLine = document.getElementById("username-line");
      const form = document.getElementById("withdraw-form");
      const submitButton = form.querySelector('button[type="submit"]');
      const reasonCategory = document.getElementById("reason-category");
      const otherReasonWrap = document.getElementById("other-reason-wrap");

      if (!window.supabase || typeof window.supabase.createClient !== "function") {
        alert("Supabase の読み込みに失敗しました。");
        return;
      }

      const supabaseUrl = "https://ndtxjdhvdedflyqgpizr.supabase.co";
      const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kdHhqZGh2ZGVkZmx5cWdwaXpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjM0MjIsImV4cCI6MjA4OTIzOTQyMn0.IVDQg_I0VeBzE2z7gXiS5p1Ci4k620qYgZSXjyenyb4";
      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

      if (sessionStorage.getItem("admin_logged_in") !== "1") {
        const { data: maintenanceSetting, error: maintenanceError } = await supabase
          .from("site_settings")
          .select("setting_value")
          .eq("setting_key", "maintenance_mode")
          .maybeSingle();

        if (!maintenanceError && maintenanceSetting?.setting_value === "on") {
          window.location.href = "maintenance.html";
          return;
        }
      }

      const { data: userData } = await supabase.auth.getUser();
      const user = userData?.user;

      if (!user) {
        window.location.href = "login.html?redirect=withdraw.html";
        return;
      }

      const { data: account, error } = await supabase
        .from("accounts")
        .select("email, display_name")
        .eq("user_id", user.id)
        .maybeSingle();

      if (error) {
        alert("アカウント情報の取得に失敗しました。");
        return;
      }

      const displayName =
        account?.display_name ||
        user.user_metadata?.username ||
        "ユーザー";

      usernameLine.textContent = displayName + "さん";

      document.getElementById("email").value = account?.email || user.email || "";
      document.getElementById("username").value
