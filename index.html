<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>舞い降りる星</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-gradient: linear-gradient(to bottom, #0b1026 0%, #1a2342 45%, #2f3d68 100%);
      --accent-color: #f2d9e8;
      --accent-hover: #ffe7f3;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --border-color: rgba(255, 255, 255, 0.2);
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: var(--bg-gradient) fixed;
      color: #f5f5f5;
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      overflow-x: hidden;
    }

    .star-field {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0;
      animation: blink var(--duration) infinite ease-in-out;
      box-shadow: 0 0 4px 1px rgba(255, 255, 255, 0.3);
    }

    @keyframes blink {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: var(--max-opacity); transform: scale(1); }
    }

    .container {
      position: relative;
      z-index: 10;
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 24px 80px;
      line-height: 1.8;
    }

    .nav-top {
      text-align: left;
      margin-bottom: 40px;
      font-size: 0.9rem;
    }

    .nav-top a {
      margin-right: 15px;
      padding: 4px 8px;
      border-radius: 4px;
      text-decoration: none;
      color: var(--accent-color);
      transition: background 0.3s;
    }

    .nav-top a:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--accent-hover);
    }

    h1 {
      text-align: center;
      font-size: 2.5rem;
      letter-spacing: 0.15em;
      margin-bottom: 2rem;
      text-shadow: 0 0 15px rgba(242, 217, 232, 0.4);
    }

    h2 {
      font-size: 1.4rem;
      margin-top: 3rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--border-color);
      display: inline-block;
      padding-bottom: 5px;
    }

    .intro-text {
      background: var(--glass-bg);
      padding: 25px;
      border-radius: 12px;
      backdrop-filter: blur(8px);
      border: 1px solid var(--border-color);
      margin-bottom: 40px;
    }

    .main-link {
      display: inline-block;
      font-size: 1.8rem;
      font-weight: bold;
      color: var(--accent-color);
      text-decoration: none;
      margin: 10px 0;
      transition: all 0.3s;
      letter-spacing: 0.05em;
    }

    .main-link:hover {
      transform: translateY(-2px);
      color: var(--accent-hover);
      text-shadow: 0 0 10px var(--accent-hover);
    }

    /* --- 隠しリンクの設定 --- */
    .secret-link {
      color: inherit;
      text-decoration: none;
      cursor: text;
      transition: opacity 0.5s;
    }

    .secret-link:hover {
      opacity: 0.7;
      cursor: pointer;
    }

    .news-box {
      max-height: 150px;
      overflow-y: auto;
      border: 1px solid var(--border-color);
      padding: 15px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
    }

    .news-box ul {
      margin: 0;
      padding-left: 1.2em;
      list-style-type: '✦ ';
    }

    .news-box li {
      margin-bottom: 8px;
      font-size: 0.95rem;
      color: #ddd;
    }
  </style>
</head>
<body>

  <div class="star-field" id="starField"></div>

  <div class="container">
    <div class="nav-top">
      <a id="user-link" href="login.html?redirect=index.html">ログイン</a>
      <a id="mypage-link" href="#" style="display:none;">マイページへ</a>
      <a id="logout-link" href="#" style="display:none;">ログアウト</a>
    </div>

    <h1>舞い降りる星</h1>

    <div class="intro-text">
      ここは、とある社畜が、やりたいことを諦めないために作った場所です。<br>
      仕事や生活の中で削られる日があっても、それでも残したい物語があり、鳴らしたい音があります。<br>
      簡単ではなくても、遠回りでも、自分の手で少しずつ形にしていきたい。<br>
      <a class="secret-link" href="https://x.com/arun_history_?s=21&t=oe3JylyzOH2-p5yGov2e9g">この場所</a>には、そんな思いと一緒に、小説や音楽を置いていきます。
    </div>

    <div style="text-align: center; margin-bottom: 40px;">
      <div style="margin-bottom: 30px;">
        <h2>小説</h2>
        <div><a class="main-link" href="novel.html">異物ノヴァ</a></div>
      </div>

      <div>
        <h2>音楽</h2>
        <div><a class="main-link" href="music.html">ぽわんと</a></div>
      </div>
    </div>

    <h2>お知らせ</h2>
    <div class="news-box">
      <ul>
        <li>2026/03/11 サイト開設しました</li>
      </ul>
    </div>
  </div>

  <script>
    const starField = document.getElementById('starField');
    const starCount = 100;
    for (let i = 0; i < starCount; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const x = Math.random() * 100;
      const y = Math.random() * 100;
      const size = Math.random() * 2 + 1;
      const duration = Math.random() * 3 + 2;
      const delay = Math.random() * 5;
      const maxOpacity = Math.random() * 0.5 + 0.3;
      star.style.left = `${x}%`;
      star.style.top = `${y}%`;
      star.style.width = `${size}px`;
      star.style.height = `${size}px`;
      star.style.setProperty('--duration', `${duration}s`);
      star.style.setProperty('--max-opacity', maxOpacity);
      star.style.animationDelay = `${delay}s`;
      starField.appendChild(star);
    }

    document.addEventListener("DOMContentLoaded", async () => {
      const redirectPage = "index.html";
      const userLink = document.getElementById("user-link");
      const mypageLink = document.getElementById("mypage-link");
      const logoutLink = document.getElementById("logout-link");

      if (!window.supabase || typeof window.supabase.createClient !== "function") {
        return;
      }

      const supabaseUrl = "https://ndtxjdhvdedflyqgpizr.supabase.co";
      const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kdHhqZGh2ZGVkZmx5cWdwaXpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjM0MjIsImV4cCI6MjA4OTIzOTQyMn0.IVDQg_I0VeBzE2z7gXiS5p1Ci4k620qYgZSXjyenyb4";
      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

      if (sessionStorage.getItem("admin_logged_in") !== "1") {
        const { data: maintenanceSetting, error: maintenanceError } = await supabase
          .from("site_settings")
          .select("setting_value")
          .eq("setting_key", "maintenance_mode")
          .maybeSingle();

        if (!maintenanceError && maintenanceSetting?.setting_value === "on") {
          window.location.href = "maintenance.html";
          return;
        }
      }

      if (sessionStorage.getItem("admin_logged_in") === "1") {
        const adminName = sessionStorage.getItem("admin_username") || "管理者";

        userLink.textContent = adminName + "さん";
        userLink.href = "admin-home.html";

        mypageLink.textContent = "管理ホームへ";
        mypageLink.href = "admin-home.html";
        mypageLink.style.display = "inline";

        logoutLink.style.display = "inline";
        logoutLink.addEventListener("click", (e) => {
          e.preventDefault();
          sessionStorage.removeItem("admin_logged_in");
          sessionStorage.removeItem("admin_username");
          window.location.href = "index.html";
        });

        return;
      }

      const { data: userData } = await supabase.auth.getUser();
      const user = userData?.user;

      if (!user) {
        userLink.textContent = "ログイン";
        userLink.href = "login.html?redirect=" + encodeURIComponent(redirectPage);
        mypageLink.style.display = "none";
        logoutLink.style.display = "none";
        return;
      }

      const { data: account } = await supabase
        .from("accounts")
        .select("display_name")
        .eq("user_id", user.id)
        .maybeSingle();

      const displayName =
        account?.display_name ||
        user.user_metadata?.username ||
        "ユーザー";

      const { data: unreadNotice } = await supabase
        .from("operator_notices")
        .select("id")
        .eq("user_id", user.id)
        .eq("is_read", false)
        .limit(1)
        .maybeSingle();

      userLink.textContent = displayName + "さん";
      userLink.href = "mypage.html?redirect=" + encodeURIComponent(redirectPage);

      mypageLink.textContent = unreadNotice
        ? "マイページへ［未読あり］"
        : "マイページへ";
      mypageLink.href = "mypage.html?redirect=" + encodeURIComponent(redirectPage);
      mypageLink.style.display = "inline";

      logoutLink.style.display = "inline";
      logoutLink.addEventListener("click", async (e) => {
        e.preventDefault();
        await supabase.auth.signOut();
        window.location.href = "login.html?redirect=" + encodeURIComponent(redirectPage);
      });
    });
  </script>
</body>
</html>
