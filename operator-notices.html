<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>運営からのお知らせ</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: linear-gradient(to bottom, #0b1026 0%, #1a2342 45%, #2f3d68 100%);
      color: #f5f5f5;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-top: 0;
      font-size: 2.5rem;
      line-height: 1.4;
    }

    a {
      color: #f2d9e8;
      text-decoration: none;
    }

    a:hover {
      color: #ffe7f3;
      text-decoration: none;
    }

    .box {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.25);
      padding: 24px;
    }

    .box p {
      margin: 12px 0;
      line-height: 1.8;
    }

    .notice-item {
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,0.18);
    }

    .notice-item:last-child {
      border-bottom: none;
    }

    .notice-title {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .notice-date {
      font-size: 0.95rem;
      opacity: 0.8;
      margin-bottom: 8px;
    }

    .notice-body {
      white-space: pre-wrap;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <p id="username-line" style="text-align: left; margin-top: 0;">ユーザーさん</p>

    <h1>運営からのお知らせ</h1>
    
    <p><a href="mypage.html">戻る</a></p>

    <div class="box">
      <div id="notice-list">
        <p>読み込み中...</p>
      </div>

      <p><a href="mypage.html">戻る</a></p>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const usernameLine = document.getElementById("username-line");
      const noticeList = document.getElementById("notice-list");

      if (!window.supabase || typeof window.supabase.createClient !== "function") {
        alert("Supabase の読み込みに失敗しました。");
        return;
      }

      const supabaseUrl = "https://ndtxjdhvdedflyqgpizr.supabase.co";
      const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kdHhqZGh2ZGVkZmx5cWdwaXpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjM0MjIsImV4cCI6MjA4OTIzOTQyMn0.IVDQg_I0VeBzE2z7gXiS5p1Ci4k620qYgZSXjyenyb4";
      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

      if (sessionStorage.getItem("admin_logged_in") !== "1") {
        const { data: maintenanceSetting, error: maintenanceError } = await supabase
          .from("site_settings")
          .select("setting_value")
          .eq("setting_key", "maintenance_mode")
          .maybeSingle();

        if (!maintenanceError && maintenanceSetting?.setting_value === "on") {
          window.location.href = "maintenance.html";
          return;
        }
      }

      const { data: userData } = await supabase.auth.getUser();
      const user = userData?.user;

      if (!user) {
        window.location.href = "login.html?redirect=operator-notices.html";
        return;
      }

      const { data: account } = await supabase
        .from("accounts")
        .select("display_name")
        .eq("user_id", user.id)
        .maybeSingle();

      const displayName =
        account?.display_name ||
        user.user_metadata?.username ||
        "ユーザー";

      usernameLine.textContent = displayName + "さん";

      const { data: notices, error } = await supabase
        .from("operator_notices")
        .select("id, title, body, is_read, created_at")
        .eq("user_id", user.id)
        .order("created_at", { ascending: false });

      if (error) {
        noticeList.innerHTML = "<p>読み込みに失敗しました。</p>";
        return;
      }

      if (!notices || notices.length === 0) {
        noticeList.innerHTML = "<p>お知らせはありません。</p>";
        return;
      }

      noticeList.innerHTML = "";

      notices.forEach((notice) => {
        const item = document.createElement("div");
        item.className = "notice-item";

        const title = document.createElement("div");
        title.className = "notice-title";
        title.textContent = notice.title || "お知らせ";

        const date = document.createElement("div");
        date.className = "notice-date";
        date.textContent = notice.created_at
          ? new Date(notice.created_at).toLocaleString("ja-JP")
          : "";

        const body = document.createElement("div");
        body.className = "notice-body";
        body.textContent = notice.body || "";

        item.appendChild(title);
        item.appendChild(date);
        item.appendChild(body);
        noticeList.appendChild(item);
      });

      const unreadIds = notices
        .filter((notice) => notice.is_read === false)
        .map((notice) => notice.id);

      if (unreadIds.length > 0) {
        await supabase
          .from("operator_notices")
          .update({ is_read: true })
          .in("id", unreadIds);
      }
    });
  </script>
</body>
</html>
