<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理者メニュー</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: linear-gradient(to bottom, #dff5e3 0%, #c7ebcf 45%, #aedfb9 100%);
      color: #111;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-top: 0;
      font-size: 2.5rem;
      line-height: 1.4;
      color: #111;
    }

    a {
      color: #111;
      text-decoration: none;
    }

    a:hover {
      color: #111;
      text-decoration: underline;
    }

    .box {
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(0,0,0,0.15);
      padding: 24px;
    }

    .box p {
      margin: 12px 0;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <p style="text-align: left; margin-top: 0;">
      <a id="admin-user-link" href="#">管理者さん</a>
    </p>

    <h1>管理者メニュー</h1>

    <div class="box">
      <p><a href="index.html">総合トップへ行く</a></p>
      <p><a href="https://supabase.com/dashboard">データベース側へ行く</a></p>
      <p><a href="account-management.html">アカウント管理</a></p>
      <p><a href="music-management.html">音楽管理</a></p>
      <p><a href="novel-management.html">小説管理</a></p>
      <p><a href="notice-management.html">お知らせ管理</a></p>
      <p id="admin-management-wrap" class="hidden"><a href="admin-management.html">管理者の管理</a></p>
      <p><a href="maintenance-control.html">メンテナンス管理</a></p>
      <p><a href="#" id="admin-logout">ログアウト</a></p>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      if (sessionStorage.getItem("admin_logged_in") !== "1") {
        window.location.href = "admin-login.html";
        return;
      }

      const adminUserLink = document.getElementById("admin-user-link");
      const savedAdminName = sessionStorage.getItem("admin_username") || "管理者";
      const adminManagementWrap = document.getElementById("admin-management-wrap");

      adminUserLink.textContent = savedAdminName + "さん";

      if (!window.supabase || typeof window.supabase.createClient !== "function") {
        alert("Supabase の読み込みに失敗しました。");
        return;
      }

      const supabaseUrl = "https://ndtxjdhvdedflyqgpizr.supabase.co";
      const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kdHhqZGh2ZGVkZmx5cWdwaXpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjM0MjIsImV4cCI6MjA4OTIzOTQyMn0.IVDQg_I0VeBzE2z7gXiS5p1Ci4k620qYgZSXjyenyb4";
      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

      const { data: userData, error: userError } = await supabase.auth.getUser();

      if (!userError && userData?.user) {
        const { data: account } = await supabase
          .from("accounts")
          .select("role")
          .eq("user_id", userData.user.id)
          .maybeSingle();

        if (account?.role === "admin") {
          adminManagementWrap.classList.remove("hidden");
        }
      }

      document.getElementById("admin-logout").addEventListener("click", function (e) {
        e.preventDefault();
        sessionStorage.removeItem("admin_logged_in");
        sessionStorage.removeItem("admin_username");
        window.location.href = "index.html";
      });
    });
  </script>
</body>
</html>
