<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>お知らせ管理</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: linear-gradient(to bottom, #dff5e3 0%, #c7ebcf 45%, #aedfb9 100%);
      color: #111;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    h1, h2 {
      text-align: center;
      margin-top: 0;
      color: #111;
      line-height: 1.4;
    }

    h1 {
      font-size: 2.5rem;
    }

    a {
      color: #111;
      text-decoration: none;
    }

    a:hover {
      color: #111;
      text-decoration: underline;
    }

    .box {
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(0,0,0,0.15);
      padding: 24px;
      margin-bottom: 20px;
    }

    .box p {
      margin: 12px 0;
      line-height: 1.8;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #111;
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      box-sizing: border-box;
      font-size: 16px;
      font-family: inherit;
    }

    input,
    select,
    textarea {
      display: block;
      padding: 10px;
      border: 1px solid rgba(0,0,0,0.2);
      background: #fff;
      color: #111;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    button {
      padding: 12px;
      border: none;
      background-color: #4f8f5b;
      color: #111;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background-color: #6aa676;
    }

    .notice-item {
      padding: 14px 0;
      border-bottom: 1px solid rgba(0,0,0,0.12);
    }

    .notice-item:last-child {
      border-bottom: none;
    }

    .notice-title {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .notice-meta {
      color: #222;
      margin-bottom: 6px;
      white-space: pre-wrap;
    }

    .notice-body {
      white-space: pre-wrap;
      line-height: 1.8;
    }

    .hidden {
      display: none;
    }

    .center-link {
      text-align: center;
      margin-top: 16px;
    }

    .disabled-note {
      color: #444;
      font-size: 0.95rem;
    }

    details {
      margin-top: 20px;
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(0,0,0,0.12);
      padding: 12px;
    }

    summary {
      cursor: pointer;
      font-weight: bold;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 12px 0 0 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <p style="text-align: left; margin-top: 0;">
      <a id="admin-user-link" href="#">管理者さん</a>
    </p>

    <h1>お知らせ管理</h1>

    <p class="center-link">
      <a href="admin-home.html">戻る</a>
    </p>

    <div class="box">
      <h2>条件付きお知らせ送信</h2>

      <form id="notice-form">
        <p>
          <label for="target-license-status">ライセンス条件</label>
          <select id="target-license-status">
            <option value="">指定なし</option>
            <option value="無し">無し</option>
            <option value="ライセンスA">ライセンスA</option>
            <option value="ライセンスB">ライセンスB</option>
          </select>
        </p>

        <p>
          <label for="target-novel-support-status">小説応援条件</label>
          <select id="target-novel-support-status">
            <option value="">指定なし</option>
            <option value="なし">なし</option>
            <option value="観測者">観測者</option>
            <option value="支援者">支援者</option>
            <option value="記録者">記録者</option>
            <option value="特別支援者">特別支援者</option>
          </select>
        </p>

        <p>
          <label for="notice-title">件名</label>
          <input type="text" id="notice-title">
        </p>

        <p>
          <label for="notice-body">本文</label>
          <textarea id="notice-body" required></textarea>
        </p>

        <p class="disabled-note">
          条件に一致したユーザー全員に、個別お知らせとして送信されます。
        </p>

        <p>
          <button type="submit">送信</button>
        </p>
      </form>
    </div>

    <div class="box hidden" id="history-box">
      <h2>送信履歴</h2>
      <div id="history-list">
        <p>読み込み中...</p>
      </div>

      <p class="center-link">
        <a href="admin-home.html">戻る</a>
      </p>
    </div>

    <details>
      <summary>通信結果</summary>
      <pre id="debug-box">読み込み中...</pre>
    </details>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      if (sessionStorage.getItem("admin_logged_in") !== "1") {
        window.location.href = "admin-login.html";
        return;
      }

      const adminUsername = sessionStorage.getItem("admin_username") || "管理者";
      const adminId = sessionStorage.getItem("admin_id");
      const adminRole = sessionStorage.getItem("admin_role") || "";
      const adminStatus = sessionStorage.getItem("admin_status") || "";

      let adminPermissions = [];
      try {
        adminPermissions = JSON.parse(sessionStorage.getItem("admin_permissions") || "[]");
        if (!Array.isArray(adminPermissions)) {
          adminPermissions = [];
        }
      } catch {
        adminPermissions = [];
      }

      const adminUserLink = document.getElementById("admin-user-link");
      const noticeForm = document.getElementById("notice-form");
      const historyBox = document.getElementById("history-box");
      const historyList = document.getElementById("history-list");
      const submitButton = noticeForm.querySelector('button[type="submit"]');
      const debugBox = document.getElementById("debug-box");

      adminUserLink.textContent = adminUsername + "さん";

      function clearAdminSession() {
        sessionStorage.removeItem("admin_logged_in");
        sessionStorage.removeItem("admin_username");
        sessionStorage.removeItem("admin_id");
        sessionStorage.removeItem("admin_role");
        sessionStorage.removeItem("admin_status");
        sessionStorage.removeItem("admin_permissions");
      }

      function renderDebug(extra = "") {
        debugBox.textContent =
          "admin_username: " + adminUsername + "\n" +
          "admin_id: " + (adminId || "") + "\n" +
          "admin_role: " + adminRole + "\n" +
          "admin_status: " + adminStatus + "\n" +
          "admin_permissions: " + JSON.stringify(adminPermissions, null, 2) +
          (extra ? "\n\n" + extra : "");
      }

      if (adminStatus !== "active") {
        alert("この管理者アカウントは停止中です。");
        clearAdminSession();
        window.location.href = "admin-login.html";
        return;
      }

      const canUseNoticeManagement =
        adminRole === "admin" ||
        (adminRole === "sub_admin" && adminPermissions.includes("notice_management"));

      if (!window.supabase || typeof window.supabase.createClient !== "function") {
        alert("Supabase の読み込みに失敗しました。");
        return;
      }

      const supabaseUrl = "https://ndtxjdhvdedflyqgpizr.supabase.co";
      const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kdHhqZGh2ZGVkZmx5cWdwaXpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjM0MjIsImV4cCI6MjA4OTIzOTQyMn0.IVDQg_I0VeBzE2z7gXiS5p1Ci4k620qYgZSXjyenyb4";
      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

      async function writePageLog(actionType, actionLabel, actionDetail) {
        const response = await fetch(`${supabaseUrl}/functions/v1/admin-write-log`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": supabaseKey,
            "Authorization": "Bearer " + supabaseKey
          },
          body: JSON.stringify({
            admin_username: adminUsername,
            target_type: adminRole === "sub_admin" ? "sub_admin" : null,
            target_id: adminRole === "sub_admin" ? adminId : null,
            action_type: actionType,
            action_label: actionLabel,
            action_detail: actionDetail
          })
        });

        const rawText = await response.text();

        renderDebug(
          "log status: " + response.status +
          "\nlog response:\n" + rawText
        );

        return response.ok;
      }

      if (!canUseNoticeManagement) {
        try {
          await writePageLog(
            "admin_forbidden_page_access",
            "権限外ページアクセス",
            "page: notice-management.html / reason: notice_management権限なし"
          );
        } catch (error) {
          renderDebug("拒否ログ保存失敗: " + String(error));
        }

        alert("この機能を使う権限がありません。");
        window.location.href = "admin-home.html";
        return;
      }

      try {
        await writePageLog(
          "notice_management_view",
          "お知らせ管理閲覧",
          `page: notice-management.html / role: ${adminRole}`
        );
      } catch (error) {
        renderDebug("閲覧ログ保存失敗: " + String(error));
      }

      function renderHistory(items) {
        historyList.innerHTML = "";

        if (!items || items.length === 0) {
          historyList.innerHTML = "<p>送信履歴はありません。</p>";
          return;
        }

        items.forEach((item) => {
          const row = document.createElement("div");
          row.className = "notice-item";

          const title = document.createElement("div");
          title.className = "notice-title";
          title.textContent = item.title || "お知らせ";

          const meta = document.createElement("div");
          meta.className = "notice-meta";

          const parts = [];
          parts.push("種別: 条件送信");

          if (item.target_license_status) {
            parts.push("ライセンス条件: " + item.target_license_status);
          }

          if (item.target_novel_support_status) {
            parts.push("小説応援条件: " + item.target_novel_support_status);
          }

          parts.push("送信者: " + (item.sent_by_admin || ""));
          parts.push("送信日時: " + (item.created_at ? new Date(item.created_at).toLocaleString("ja-JP") : ""));

          meta.textContent = parts.join("\n");

          const body = document.createElement("div");
          body.className = "notice-body";
          body.textContent = item.body || "";

          row.appendChild(title);
          row.appendChild(meta);
          row.appendChild(body);

          historyList.appendChild(row);
        });
      }

      async function loadHistory() {
        historyList.innerHTML = "<p>読み込み中...</p>";

        const { data, error } = await supabase
          .from("operator_notices")
          .select("id, title, body, notice_type, sent_by_admin, target_license_status, target_novel_support_status, created_at")
          .eq("notice_type", "condition")
          .order("created_at", { ascending: false })
          .limit(20);

        if (error) {
          historyList.innerHTML = "<p>読み込みに失敗しました。</p>";
          renderDebug("履歴取得エラー: " + error.message);
          return;
        }

        renderHistory(data || []);
        renderDebug("履歴件数: " + (data || []).length);
      }

      if (adminRole === "admin") {
        historyBox.classList.remove("hidden");
        await loadHistory();
      } else {
        renderDebug("準管理者のため履歴は非表示です。");
      }

      noticeForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const targetLicenseStatus = document.getElementById("target-license-status").value;
        const targetNovelSupportStatus = document.getElementById("target-novel-support-status").value;
        const noticeTitle = document.getElementById("notice-title").value.trim();
        const noticeBody = document.getElementById("notice-body").value.trim();

        if (!noticeBody) {
          alert("本文を入力してください。");
          return;
        }

        submitButton.disabled = true;
        submitButton.textContent = "送信中...";

        try {
          const response = await fetch(`${supabaseUrl}/functions/v1/admin-send-conditional-notice`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "apikey": supabaseKey,
              "Authorization": "Bearer " + supabaseKey
            },
            body: JSON.stringify({
              admin_username: adminUsername,
              target_license_status: targetLicenseStatus,
              target_novel_support_status: targetNovelSupportStatus,
              title: noticeTitle,
              body: noticeBody
            })
          });

          const rawText = await response.text();
          let result = null;

          try {
            result = rawText ? JSON.parse(rawText) : {};
          } catch (_) {
            alert("送信に失敗しました。");
            renderDebug("送信レスポンス解析失敗:\n" + rawText);
            return;
          }

          if (!response.ok || !result || !result.ok) {
            alert(result?.error || "送信に失敗しました。");
            renderDebug("送信失敗:\n" + rawText);
            return;
          }

          alert("送信しました。");
          noticeForm.reset();
          renderDebug("送信成功: " + (result.sent_count || 0) + "件");

          if (adminRole === "admin") {
            await loadHistory();
          }
        } catch (err) {
          alert("予期しないエラーが発生しました。");
          renderDebug("予期しないエラー: " + String(err));
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = "送信";
        }
      });
    });
  </script>
</body>
</html>
