<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>お問い合わせ</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: linear-gradient(to bottom, #0b1026 0%, #1a2342 45%, #2f3d68 100%);
      color: #f5f5f5;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-top: 0;
      font-size: 2.5rem;
      line-height: 1.4;
    }

    a {
      color: #f2d9e8;
      text-decoration: none;
    }

    a:hover {
      color: #ffe7f3;
      text-decoration: none;
    }

    .box {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.25);
      padding: 24px;
    }

    .box p {
      margin: 0 0 16px 0;
      line-height: 1.8;
    }

    textarea,
    button {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      display: block;
      box-sizing: border-box;
      font-size: 16px;
      font-family: inherit;
    }

    textarea {
      min-height: 180px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.95);
      color: #222;
      resize: vertical;
    }

    button {
      padding: 12px;
      border: none;
      background-color: #7a5c61;
      color: #fff;
      cursor: pointer;
    }

    button:hover {
      background-color: #9a747b;
    }
  </style>
</head>
<body>
  <div class="container">
    <p id="username-line" style="text-align: left; margin-top: 0;">ユーザーさん</p>

    <h1>お問い合わせ</h1>

    <div class="box">
      <form id="contact-form">
        <p>
          <textarea id="inquiry-body" placeholder="本文を入力してください" required></textarea>
        </p>

        <p>
          <button type="submit">送信</button>
        </p>
      </form>

      <p><a href="mypage.html">戻る</a></p>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const usernameLine = document.getElementById("username-line");
      const form = document.getElementById("contact-form");
      const submitButton = form.querySelector('button[type="submit"]');

      if (!window.supabase || typeof window.supabase.createClient !== "function") {
        alert("Supabase の読み込みに失敗しました。");
        return;
      }

      const supabaseUrl = "https://ndtxjdhvdedflyqgpizr.supabase.co";
      const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kdHhqZGh2ZGVkZmx5cWdwaXpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjM0MjIsImV4cCI6MjA4OTIzOTQyMn0.IVDQg_I0VeBzE2z7gXiS5p1Ci4k620qYgZSXjyenyb4";
      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

      if (sessionStorage.getItem("admin_logged_in") !== "1") {
        const { data: maintenanceSetting, error: maintenanceError } = await supabase
          .from("site_settings")
          .select("setting_value")
          .eq("setting_key", "maintenance_mode")
          .maybeSingle();

        if (!maintenanceError && maintenanceSetting?.setting_value === "on") {
          window.location.href = "maintenance.html";
          return;
        }
      }

      const { data: userData } = await supabase.auth.getUser();
      const user = userData?.user;

      if (!user) {
        window.location.href = "login.html?redirect=contact-page.html";
        return;
      }

      const { data: account } = await supabase
        .from("accounts")
        .select("display_name")
        .eq("user_id", user.id)
        .maybeSingle();

      const displayName =
        account?.display_name ||
        user.user_metadata?.username ||
        "ユーザー";

      usernameLine.textContent = displayName + "さん";

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const body = document.getElementById("inquiry-body").value.trim();
        if (!body) return;

        submitButton.disabled = true;
        submitButton.textContent = "送信中...";

        try {
          const { error } = await supabase
            .from("inquiries")
            .insert([
              {
                user_id: user.id,
                body,
                status: "未解決"
              }
            ]);

          if (error) {
            alert("送信に失敗しました: " + error.message);
            return;
          }

          alert("送信しました。");
          window.location.href = "mypage.html";
        } catch (err) {
          alert("予期しないエラーが発生しました。");
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = "送信";
        }
      });
    });
  </script>
</body>
</html>
