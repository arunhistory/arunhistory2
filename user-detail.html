<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ユーザー情報</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: linear-gradient(to bottom, #dff5e3 0%, #c7ebcf 45%, #aedfb9 100%);
      color: #111;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    h1, h2 {
      text-align: center;
      margin-top: 0;
      line-height: 1.4;
      color: #111;
    }

    h1 {
      font-size: 2.5rem;
    }

    a {
      color: #111;
      text-decoration: none;
    }

    a:hover {
      color: #111;
      text-decoration: underline;
    }

    .box {
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(0,0,0,0.15);
      padding: 24px;
      margin-bottom: 20px;
    }

    .box p {
      margin: 12px 0;
      line-height: 1.8;
      word-break: break-all;
    }

    .center-link {
      text-align: center;
      margin-top: 16px;
    }

    .danger-box {
      background: rgba(255,255,255,0.75);
      border: 2px solid rgba(120,0,0,0.45);
      padding: 24px;
      margin-bottom: 20px;
    }

    .danger-button {
      width: 100%;
      padding: 16px;
      font-size: 20px;
      border: 2px solid #111;
      background: repeating-linear-gradient(
        -45deg,
        #ffd400 0px,
        #ffd400 14px,
        #111 14px,
        #111 28px
      );
      color: #c00000;
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
      letter-spacing: 1px;
      text-shadow: 0 1px 0 rgba(255,255,255,0.35);
    }

    .danger-button:hover {
      filter: brightness(1.05);
    }

    .danger-note {
      text-align: center;
      margin-bottom: 16px;
      line-height: 1.8;
    }

    details {
      margin-top: 20px;
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(0,0,0,0.12);
      padding: 12px;
    }

    summary {
      cursor: pointer;
      font-weight: bold;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 12px 0 0 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <p style="text-align: left; margin-top: 0;">
      <a id="admin-user-link" href="#">管理者さん</a>
    </p>

    <h1>ユーザー情報</h1>

    <p class="center-link">
      <a href="account-info-admin.html">戻る</a>
    </p>

    <div class="box">
      <p>メールアドレス: <span id="email-value">読み込み中...</span></p>
      <p>ユーザー名: <span id="display-name-value">読み込み中...</span></p>
      <p>パスワード: <span id="password-value">非表示</span></p>
      <p>生年月日: <span id="birthdate-value">読み込み中...</span></p>
      <p>性別: <span id="gender-value">読み込み中...</span></p>
      <p>国: <span id="country-value">読み込み中...</span></p>
      <p>音楽ライセンス: <span id="license-status-value">読み込み中...</span></p>
      <p>小説応援: <span id="novel-support-value">読み込み中...</span></p>
      <p>現在の状態: <span id="account-status-value">読み込み中...</span></p>
      <p>退会申請状況: <span id="withdraw-status-value">読み込み中...</span></p>
      <p>お問い合わせ状況: <span id="inquiry-status-value">読み込み中...</span></p>
      <p>最終ログイン日時: <span id="last-login-value">読み込み中...</span></p>

      <p class="center-link">
        <a href="account-info-admin.html">戻る</a>
      </p>
    </div>

    <div class="danger-box">
      <p class="danger-note">
        危険な操作を行う場合のみ進んでください。<br>
        次の画面で再度管理者ログインが必要です。
      </p>
      <button type="button" class="danger-button" id="danger-button">DANGER</button>
    </div>

    <details>
      <summary>通信結果</summary>
      <pre id="debug-box">読み込み中...</pre>
    </details>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      if (sessionStorage.getItem("admin_logged_in") !== "1") {
        window.location.href = "admin-login.html";
        return;
      }

      const adminUsername = sessionStorage.getItem("admin_username") || "管理者";
      const adminId = sessionStorage.getItem("admin_id");
      const adminRole = sessionStorage.getItem("admin_role") || "";
      const adminStatus = sessionStorage.getItem("admin_status") || "";

      let adminPermissions = [];
      try {
        adminPermissions = JSON.parse(sessionStorage.getItem("admin_permissions") || "[]");
        if (!Array.isArray(adminPermissions)) {
          adminPermissions = [];
        }
      } catch {
        adminPermissions = [];
      }

      const adminUserLink = document.getElementById("admin-user-link");
      const debugBox = document.getElementById("debug-box");
      const params = new URLSearchParams(window.location.search);
      const userId = params.get("id");

      adminUserLink.textContent = adminUsername + "さん";

      function clearAdminSession() {
        sessionStorage.removeItem("admin_logged_in");
        sessionStorage.removeItem("admin_username");
        sessionStorage.removeItem("admin_id");
        sessionStorage.removeItem("admin_role");
        sessionStorage.removeItem("admin_status");
        sessionStorage.removeItem("admin_permissions");
      }

      function renderDebug(extra = "") {
        debugBox.textContent =
          "admin_username: " + adminUsername + "\n" +
          "admin_id: " + (adminId || "") + "\n" +
          "admin_role: " + adminRole + "\n" +
          "admin_status: " + adminStatus + "\n" +
          "user_id: " + (userId || "") + "\n" +
          "admin_permissions: " + JSON.stringify(adminPermissions, null, 2) +
          (extra ? "\n\n" + extra : "");
      }

      if (adminStatus !== "active") {
        alert("この管理者アカウントは停止中です。");
        clearAdminSession();
        window.location.href = "admin-login.html";
        return;
      }

      if (!userId) {
        alert("ユーザーIDが指定されていません。");
        window.location.href = "account-info-admin.html";
        return;
      }

      const supabaseUrl = "https://ndtxjdhvdedflyqgpizr.supabase.co";
      const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kdHhqZGh2ZGVkZmx5cWdwaXpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjM0MjIsImV4cCI6MjA4OTIzOTQyMn0.IVDQg_I0VeBzE2z7gXiS5p1Ci4k620qYgZSXjyenyb4";

      async function writePageLog(actionType, actionLabel, actionDetail) {
        const response = await fetch(`${supabaseUrl}/functions/v1/admin-write-log`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": supabaseKey,
            "Authorization": "Bearer " + supabaseKey
          },
          body: JSON.stringify({
            admin_username: adminUsername,
            target_type: adminRole === "sub_admin" ? "sub_admin" : null,
            target_id: adminRole === "sub_admin" ? adminId : null,
            action_type: actionType,
            action_label: actionLabel,
            action_detail: actionDetail
          })
        });

        const rawText = await response.text();

        renderDebug(
          "log status: " + response.status +
          "\nlog response:\n" + rawText
        );

        return response.ok;
      }

      const canUseUserDetail =
        adminRole === "admin" ||
        (adminRole === "sub_admin" && adminPermissions.includes("account_management"));

      if (!canUseUserDetail) {
        try {
          await writePageLog(
            "admin_forbidden_page_access",
            "権限外ページアクセス",
            "page: user-detail.html / reason: account_management権限なし"
          );
        } catch (error) {
          renderDebug("拒否ログ保存失敗: " + String(error));
        }

        alert("この機能を使う権限がありません。");
        window.location.href = "admin-home.html";
        return;
      }

      try {
        await writePageLog(
          "user_detail_view",
          "ユーザー情報閲覧",
          `page: user-detail.html / user_id: ${userId} / role: ${adminRole}`
        );
      } catch (error) {
        renderDebug("閲覧ログ保存失敗: " + String(error));
      }

      if (!window.supabase || typeof window.supabase.createClient !== "function") {
        alert("Supabase の読み込みに失敗しました。");
        return;
      }

      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

      document.getElementById("danger-button").addEventListener("click", () => {
        window.location.href = "admin-danger-login.html?id=" + encodeURIComponent(userId);
      });

      const { data: account, error: accountError } = await supabase
        .from("accounts")
        .select("user_id, email, display_name, birthdate, gender, country, status, license_status, novel_support_status, last_login_at")
        .eq("user_id", userId)
        .maybeSingle();

      if (accountError || !account) {
        alert("ユーザー情報の読み込みに失敗しました。");
        renderDebug("ユーザー情報取得失敗: " + (accountError?.message || "not found"));
        window.location.href = "account-info-admin.html";
        return;
      }

      document.getElementById("email-value").textContent = account.email || "";
      document.getElementById("display-name-value").textContent = account.display_name || "";
      document.getElementById("birthdate-value").textContent = account.birthdate || "";
      document.getElementById("gender-value").textContent = account.gender || "";
      document.getElementById("country-value").textContent = account.country || "";
      document.getElementById("license-status-value").textContent = account.license_status || "無し";
      document.getElementById("novel-support-value").textContent = account.novel_support_status || "なし";
      document.getElementById("last-login-value").textContent = account.last_login_at
        ? new Date(account.last_login_at).toLocaleString("ja-JP")
        : "";

      const statusMap = {
        active: "利用中",
        suspended: "利用停止",
        partial_suspended: "一部利用停止",
        banned: "BAN",
        delete_requested: "削除対象"
      };

      document.getElementById("account-status-value").textContent =
        statusMap[account.status] || account.status || "";

      const { data: withdrawRequest } = await supabase
        .from("withdraw_requests")
        .select("status")
        .eq("user_id", userId)
        .order("requested_at", { ascending: false })
        .limit(1)
        .maybeSingle();

      document.getElementById("withdraw-status-value").textContent =
        withdrawRequest?.status || "なし";

      const { data: inquiry } = await supabase
        .from("inquiries")
        .select("id")
        .eq("user_id", userId)
        .eq("status", "未解決")
        .limit(1)
        .maybeSingle();

      document.getElementById("inquiry-status-value").textContent =
        inquiry ? "未解決" : "なし";

      renderDebug("ユーザー情報表示成功");
    });
  </script>
</body>
</html>
