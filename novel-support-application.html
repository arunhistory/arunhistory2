<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>小説応援申請</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: linear-gradient(to bottom, #0b1026 0%, #1a2342 45%, #2f3d68 100%);
      color: #f5f5f5;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-top: 0;
      font-size: 2.5rem;
      line-height: 1.4;
    }

    a {
      color: #f2d9e8;
      text-decoration: none;
    }

    a:hover {
      color: #ffe7f3;
      text-decoration: none;
    }

    .box {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.25);
      padding: 24px;
    }

    .box p {
      margin: 0 0 16px 0;
      line-height: 1.8;
    }

    .notice {
      margin-bottom: 20px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.08);
      line-height: 1.8;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input,
    button {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      display: block;
      box-sizing: border-box;
      font-size: 16px;
      font-family: inherit;
    }

    input[type="file"] {
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.95);
      color: #222;
    }

    button {
      padding: 12px;
      border: none;
      background-color: #7a5c61;
      color: #fff;
      cursor: pointer;
    }

    button:hover {
      background-color: #9a747b;
    }

    .preview-wrap {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.08);
    }

    .preview-wrap p {
      margin: 0 0 12px 0;
    }

    .preview-image {
      width: 100%;
      max-width: 100%;
      height: auto;
      display: block;
      border: 1px solid rgba(255,255,255,0.25);
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <p id="username-line" style="text-align: left; margin-top: 0;">ユーザーさん</p>

    <h1>小説応援申請</h1>

    <div class="box">
      <p class="notice">
        この申請は、noteメンバーシップのスクリーンショットを送ってください。申請後、表示までに最大2週間いただきます。
      </p>

      <form id="novel-support-form">
        <p>
          <label for="support-image">画像を添付</label>
          <input type="file" id="support-image" accept="image/*" required>
        </p>

        <div class="preview-wrap" id="preview-wrap">
          <p>添付画像の表示</p>
          <img id="preview-image" class="preview-image" alt="添付画像プレビュー">
        </div>

        <p>
          <button type="submit">送信</button>
        </p>
      </form>

      <p><a href="application-status.html">戻る</a></p>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const usernameLine = document.getElementById("username-line");
      const form = document.getElementById("novel-support-form");
      const submitButton = form.querySelector('button[type="submit"]');
      const imageInput = document.getElementById("support-image");
      const previewWrap = document.getElementById("preview-wrap");
      const previewImage = document.getElementById("preview-image");

      let selectedFile = null;

      if (!window.supabase || typeof window.supabase.createClient !== "function") {
        alert("Supabase の読み込みに失敗しました。");
        return;
      }

      const supabaseUrl = "https://ndtxjdhvdedflyqgpizr.supabase.co";
      const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kdHhqZGh2ZGVkZmx5cWdwaXpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjM0MjIsImV4cCI6MjA4OTIzOTQyMn0.IVDQg_I0VeBzE2z7gXiS5p1Ci4k620qYgZSXjyenyb4";
      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

      if (sessionStorage.getItem("admin_logged_in") !== "1") {
        const { data: maintenanceSetting, error: maintenanceError } = await supabase
          .from("site_settings")
          .select("setting_value")
          .eq("setting_key", "maintenance_mode")
          .maybeSingle();

        if (!maintenanceError && maintenanceSetting?.setting_value === "on") {
          window.location.href = "maintenance.html";
          return;
        }
      }

      const { data: userData } = await supabase.auth.getUser();
      const user = userData?.user;

      if (!user) {
        window.location.href = "login.html?redirect=novel-support-application.html";
        return;
      }

      const { data: account } = await supabase
        .from("accounts")
        .select("display_name")
        .eq("user_id", user.id)
        .maybeSingle();

      const displayName =
        account?.display_name ||
        user.user_metadata?.username ||
        "ユーザー";

      usernameLine.textContent = displayName + "さん";

      const { data: latestApplication } = await supabase
        .from("novel_support_applications")
        .select("status")
        .eq("user_id", user.id)
        .order("created_at", { ascending: false })
        .limit(1)
        .maybeSingle();

      const latestStatus = latestApplication?.status || "申請前";

      if (!(latestStatus === "申請前" || latestStatus === "却下")) {
        alert("現在、この申請はできません。");
        window.location.href = "application-status.html";
        return;
      }

      imageInput.addEventListener("change", () => {
        const file = imageInput.files && imageInput.files[0];
        selectedFile = file || null;

        if (!file) {
          previewWrap.style.display = "none";
          previewImage.removeAttribute("src");
          return;
        }

        const reader = new FileReader();
        reader.onload = (event) => {
          previewImage.src = event.target.result;
          previewWrap.style.display = "block";
        };
        reader.readAsDataURL(file);
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        if (!selectedFile) {
          alert("画像を添付してください。");
          return;
        }

        submitButton.disabled = true;
        submitButton.textContent = "送信中...";

        try {
          const { error } = await supabase
            .from("novel_support_applications")
            .insert([
              {
                user_id: user.id,
                screenshot_url: null,
                detected_plan: null,
                status: "申請中"
              }
            ]);

          if (error) {
            alert("申請に失敗しました: " + error.message);
            return;
          }

          const { error: accountUpdateError } = await supabase
            .from("accounts")
            .update({
              novel_support_status: "確認中"
            })
            .eq("user_id", user.id);

          if (accountUpdateError) {
            alert("申請は送信されましたが、利用状況更新に失敗しました: " + accountUpdateError.message);
            return;
          }

          alert("申請を受け付けました。");
          window.location.href = "application-status.html";
        } catch (err) {
          alert("予期しないエラーが発生しました。");
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = "送信";
        }
      });
    });
  </script>
</body>
</html>
