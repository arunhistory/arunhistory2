<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>マイページ</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: linear-gradient(to bottom, #0b1026 0%, #1a2342 45%, #2f3d68 100%);
      color: #f5f5f5;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-top: 0;
      font-size: 2.5rem;
      line-height: 1.4;
    }

    a {
      color: #f2d9e8;
      text-decoration: none;
    }

    a:hover {
      color: #ffe7f3;
      text-decoration: none;
    }

    .box {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.25);
      padding: 24px;
    }

    .box p {
      margin: 12px 0;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <p id="username-line" style="text-align: left; margin-top: 0;">ユーザーさん</p>

    <h1>マイページ</h1>

    <div class="box">
      <p><a href="account-info.html">アカウント情報</a></p>
      <p><a href="usage-status.html">利用状況</a></p>
      <p><a href="application-status.html">申請状況</a></p>
      <p><a id="operator-notices-link" href="operator-notices.html">運営からのお知らせ</a></p>
      <p><a href="contact-page.html">お問い合わせ</a></p>
      <p><a href="withdraw.html">退会</a></p>
      <p><a id="back-link" href="index.html">元のページへ戻る</a></p>
      <p><a href="#" id="logout-link">ログアウト</a></p>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const params = new URLSearchParams(window.location.search);
      const redirect = params.get("redirect") || "index.html";

      const backLink = document.getElementById("back-link");
      const usernameLine = document.getElementById("username-line");
      const operatorNoticesLink = document.getElementById("operator-notices-link");
      const logoutLink = document.getElementById("logout-link");

      backLink.href = redirect;

      if (!window.supabase || typeof window.supabase.createClient !== "function") {
        alert("Supabase の読み込みに失敗しました。");
        return;
      }

      const supabaseUrl = "https://ndtxjdhvdedflyqgpizr.supabase.co";
      const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kdHhqZGh2ZGVkZmx5cWdwaXpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjM0MjIsImV4cCI6MjA4OTIzOTQyMn0.IVDQg_I0VeBzE2z7gXiS5p1Ci4k620qYgZSXjyenyb4";
      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

      if (sessionStorage.getItem("admin_logged_in") !== "1") {
        const { data: maintenanceSetting, error: maintenanceError } = await supabase
          .from("site_settings")
          .select("setting_value")
          .eq("setting_key", "maintenance_mode")
          .maybeSingle();

        if (!maintenanceError && maintenanceSetting?.setting_value === "on") {
          window.location.href = "maintenance.html";
          return;
        }
      }

      const { data: userData } = await supabase.auth.getUser();
      const user = userData?.user;

      if (!user) {
        window.location.href = "login.html?redirect=" + encodeURIComponent(redirect);
        return;
      }

      const { data: account, error: accountError } = await supabase
        .from("accounts")
        .select("display_name")
        .eq("user_id", user.id)
        .maybeSingle();

      if (accountError) {
        alert("アカウント情報の取得に失敗しました。");
        return;
      }

      const displayName =
        account?.display_name ||
        user.user_metadata?.username ||
        "ユーザー";

      usernameLine.textContent = displayName + "さん";

      const { data: unreadNotice } = await supabase
        .from("operator_notices")
        .select("id")
        .eq("user_id", user.id)
        .eq("is_read", false)
        .limit(1)
        .maybeSingle();

      operatorNoticesLink.textContent = unreadNotice
        ? "運営からのお知らせ（未読あり）"
        : "運営からのお知らせ";

      logoutLink.addEventListener("click", async (e) => {
        e.preventDefault();
        await supabase.auth.signOut();
        window.location.href = "login.html?redirect=" + encodeURIComponent(redirect);
      });
    });
  </script>
</body>
</html>
