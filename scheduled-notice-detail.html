<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>予約投稿詳細</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: linear-gradient(to bottom, #dff5e3 0%, #c7ebcf 45%, #aedfb9 100%);
      color: #111;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 20px;
      color: #111;
      line-height: 1.4;
      font-size: 2.4rem;
    }

    a {
      color: #111;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .box {
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(0,0,0,0.15);
      padding: 24px;
      margin-bottom: 20px;
    }

    .detail-row {
      margin: 14px 0;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .label {
      font-weight: bold;
    }

    .body-box {
      margin-top: 8px;
      padding: 14px;
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(0,0,0,0.12);
      white-space: pre-wrap;
      line-height: 1.8;
      word-break: break-word;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }

    button {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border: none;
      font-size: 16px;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      color: #111;
    }

    .update-button {
      background: #c7d9f2;
    }

    .update-button:hover {
      background: #aec6e8;
    }

    .delete-button {
      background: #d9b3b3;
    }

    .delete-button:hover {
      background: #c99393;
    }

    .back-button {
      background: #cfe7d3;
    }

    .back-button:hover {
      background: #b8d8be;
    }

    .center-link {
      text-align: center;
      margin: 16px 0;
    }

    details {
      margin-top: 20px;
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(0,0,0,0.12);
      padding: 12px;
    }

    summary {
      cursor: pointer;
      font-weight: bold;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 12px 0 0 0;
      font-size: 14px;
    }

    @media (max-width: 700px) {
      .button-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <p style="text-align:left; margin-top:0;">
      <a id="admin-user-link" href="#">管理者さん</a>
    </p>

    <h1>予約投稿詳細</h1>

    <p class="center-link">
      <a href="scheduled-notices.html">戻る</a>
    </p>

    <div class="box">
      <div id="detail-box">
        <p>読み込み中...</p>
      </div>

      <div class="button-row">
        <button type="button" class="update-button" id="update-datetime-button">日時変更</button>
        <button type="button" class="delete-button" id="delete-button">削除</button>
        <button type="button" class="back-button" id="back-button">戻る</button>
      </div>
    </div>

    <details>
      <summary>通信結果</summary>
      <pre id="debug-box">読み込み中...</pre>
    </details>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      if (sessionStorage.getItem("admin_logged_in") !== "1") {
        window.location.href = "admin-login.html";
        return;
      }

      const adminUsername = sessionStorage.getItem("admin_username") || "管理者";
      const adminId = sessionStorage.getItem("admin_id");
      const adminRole = sessionStorage.getItem("admin_role") || "";
      const adminStatus = sessionStorage.getItem("admin_status") || "";

      let adminPermissions = [];
      try {
        adminPermissions = JSON.parse(sessionStorage.getItem("admin_permissions") || "[]");
        if (!Array.isArray(adminPermissions)) {
          adminPermissions = [];
        }
      } catch {
        adminPermissions = [];
      }

      const params = new URLSearchParams(window.location.search);
      const scheduledNoticeId = params.get("id") || "";

      const adminUserLink = document.getElementById("admin-user-link");
      const detailBox = document.getElementById("detail-box");
      const updateDatetimeButton = document.getElementById("update-datetime-button");
      const deleteButton = document.getElementById("delete-button");
      const backButton = document.getElementById("back-button");
      const debugBox = document.getElementById("debug-box");

      adminUserLink.textContent = adminUsername + "さん";
      backButton.addEventListener("click", () => {
        window.location.href = "scheduled-notices.html";
      });

      function clearAdminSession() {
        sessionStorage.removeItem("admin_logged_in");
        sessionStorage.removeItem("admin_username");
        sessionStorage.removeItem("admin_id");
        sessionStorage.removeItem("admin_role");
        sessionStorage.removeItem("admin_status");
        sessionStorage.removeItem("admin_permissions");
      }

      function renderDebug(extra = "") {
        debugBox.textContent =
          "admin_username: " + adminUsername + "\n" +
          "admin_id: " + (adminId || "") + "\n" +
          "admin_role: " + adminRole + "\n" +
          "admin_status: " + adminStatus + "\n" +
          "admin_permissions: " + JSON.stringify(adminPermissions, null, 2) + "\n" +
          "scheduled_notice_id: " + scheduledNoticeId +
          (extra ? "\n\n" + extra : "");
      }

      function formatDateTime(value) {
        if (!value) return "";
        return new Date(value).toLocaleString("ja-JP");
      }

      function toDateInputValue(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, "0");
        const d = String(date.getDate()).padStart(2, "0");
        return `${y}-${m}-${d}`;
      }

      function toTimeInputValue(date) {
        const h = String(date.getHours()).padStart(2, "0");
        const m = String(date.getMinutes()).padStart(2, "0");
        return `${h}:${m}`;
      }

      function buildScheduledAt(dateValue, timeValue) {
        if (!dateValue || !timeValue) return "";
        return `${dateValue}T${timeValue}:00+09:00`;
      }

      if (adminStatus !== "active") {
        alert("この管理者アカウントは停止中です。");
        clearAdminSession();
        window.location.href = "admin-login.html";
        return;
      }

      const canUseNoticeManagement =
        adminRole === "admin" ||
        (adminRole === "sub_admin" && adminPermissions.includes("notice_management"));

      if (!canUseNoticeManagement) {
        alert("この機能を使う権限がありません。");
        window.location.href = "admin-home.html";
        return;
      }

      if (!scheduledNoticeId) {
        detailBox.innerHTML = "<p>予約IDが見つかりません。</p>";
        renderDebug("予約IDが空です。");
        updateDatetimeButton.disabled = true;
        deleteButton.disabled = true;
        return;
      }

      if (!window.supabase || typeof window.supabase.createClient !== "function") {
        alert("Supabase の読み込みに失敗しました。");
        return;
      }

      const supabaseUrl = "https://ndtxjdhvdedflyqgpizr.supabase.co";
      const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kdHhqZGh2ZGVkZmx5cWdwaXpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjM0MjIsImV4cCI6MjA4OTIzOTQyMn0.IVDQg_I0VeBzE2z7gXiS5p1Ci4k620qYgZSXjyenyb4";
      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

      let currentItem = null;

      function renderDetail(item) {
        detailBox.innerHTML = "";

        const rows = [];

        if (adminRole === "admin") {
          rows.push({ label: "作成者", value: item.created_by_admin || "" });
          rows.push({ label: "作成日時", value: formatDateTime(item.created_at) });
        }

        rows.push({ label: "タイトル", value: item.title || "件名なし" });
        rows.push({ label: "予約投稿日時", value: formatDateTime(item.scheduled_at) });

        rows.forEach((row) => {
          const div = document.createElement("div");
          div.className = "detail-row";
          div.innerHTML = `<span class="label">${row.label}</span>\n${row.value}`;
          detailBox.appendChild(div);
        });

        const bodyRow = document.createElement("div");
        bodyRow.className = "detail-row";
        bodyRow.innerHTML = `<span class="label">本文</span>`;
        detailBox.appendChild(bodyRow);

        const bodyBox = document.createElement("div");
        bodyBox.className = "body-box";
        bodyBox.textContent = item.body || "";
        detailBox.appendChild(bodyBox);
      }

      async function loadDetail() {
        detailBox.innerHTML = "<p>読み込み中...</p>";

        const { data, error } = await supabase
          .from("scheduled_notices")
          .select("id, title, body, scheduled_at, status, created_by_admin, created_at")
          .eq("id", Number(scheduledNoticeId))
          .maybeSingle();

        if (error) {
          detailBox.innerHTML = "<p>読み込みに失敗しました。</p>";
          renderDebug("詳細取得エラー: " + error.message);
          updateDatetimeButton.disabled = true;
          deleteButton.disabled = true;
          return;
        }

        if (!data) {
          detailBox.innerHTML = "<p>対象の予約投稿が見つかりません。</p>";
          renderDebug("対象データなし");
          updateDatetimeButton.disabled = true;
          deleteButton.disabled = true;
          return;
        }

        currentItem = data;
        renderDetail(data);
        renderDebug("詳細取得成功");
      }

      updateDatetimeButton.addEventListener("click", async () => {
        if (!currentItem) {
          alert("予約投稿の読み込み完了後にお試しください。");
          return;
        }

        const currentDate = new Date(currentItem.scheduled_at);
        const nextDateValue = window.prompt(
          "変更後の予約日を入力してください（例: 2026-03-21）",
          toDateInputValue(currentDate)
        );
        if (nextDateValue === null) return;

        const trimmedDate = nextDateValue.trim();
        if (!trimmedDate) {
          alert("予約日を入力してください。");
          return;
        }

        const nextTimeValue = window.prompt(
          "変更後の予約時間を入力してください（例: 11:30）",
          toTimeInputValue(currentDate)
        );
        if (nextTimeValue === null) return;

        const trimmedTime = nextTimeValue.trim();
        if (!trimmedTime) {
          alert("予約時間を入力してください。");
          return;
        }

        const scheduledAt = buildScheduledAt(trimmedDate, trimmedTime);
        if (!scheduledAt) {
          alert("日時の指定が不正です。");
          return;
        }

        const confirmed = window.confirm("この予約投稿の日時を変更しますか？");
        if (!confirmed) return;

        updateDatetimeButton.disabled = true;
        deleteButton.disabled = true;

        try {
          const response = await fetch(`${supabaseUrl}/functions/v1/admin-update-scheduled-notice-datetime`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "apikey": supabaseKey,
              "Authorization": "Bearer " + supabaseKey
            },
            body: JSON.stringify({
              admin_username: adminUsername,
              scheduled_notice_id: Number(scheduledNoticeId),
              scheduled_at: scheduledAt
            })
          });

          const rawText = await response.text();
          let result = null;

          try {
            result = rawText ? JSON.parse(rawText) : {};
          } catch (_) {
            alert("日時変更に失敗しました。");
            renderDebug("日時変更レスポンス解析失敗:\n" + rawText);
            return;
          }

          if (!response.ok || !result || !result.ok) {
            alert(result?.error || "日時変更に失敗しました。");
            renderDebug("日時変更失敗:\n" + rawText);
            return;
          }

          alert("予約日時を変更しました。");
          await loadDetail();
        } catch (err) {
          alert("予期しないエラーが発生しました。");
          renderDebug("日時変更エラー: " + String(err));
        } finally {
          updateDatetimeButton.disabled = false;
          deleteButton.disabled = false;
        }
      });

      deleteButton.addEventListener("click", async () => {
        if (!currentItem) {
          alert("予約投稿の読み込み完了後にお試しください。");
          return;
        }

        const confirmed = window.confirm("この予約投稿を削除しますか？");
        if (!confirmed) return;

        updateDatetimeButton.disabled = true;
        deleteButton.disabled = true;

        try {
          const response = await fetch(`${supabaseUrl}/functions/v1/admin-delete-scheduled-notice`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "apikey": supabaseKey,
              "Authorization": "Bearer " + supabaseKey
            },
            body: JSON.stringify({
              admin_username: adminUsername,
              scheduled_notice_id: Number(scheduledNoticeId)
            })
          });

          const rawText = await response.text();
          let result = null;

          try {
            result = rawText ? JSON.parse(rawText) : {};
          } catch (_) {
            alert("削除に失敗しました。");
            renderDebug("削除レスポンス解析失敗:\n" + rawText);
            updateDatetimeButton.disabled = false;
            deleteButton.disabled = false;
            return;
          }

          if (!response.ok || !result || !result.ok) {
            alert(result?.error || "削除に失敗しました。");
            renderDebug("削除失敗:\n" + rawText);
            updateDatetimeButton.disabled = false;
            deleteButton.disabled = false;
            return;
          }

          alert("削除しました。");
          window.location.href = "scheduled-notices.html";
        } catch (err) {
          alert("予期しないエラーが発生しました。");
          renderDebug("削除エラー: " + String(err));
          updateDatetimeButton.disabled = false;
          deleteButton.disabled = false;
        }
      });

      await loadDetail();
    });
  </script>
</body>
</html>
