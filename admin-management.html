<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>準管理者メニュー</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: linear-gradient(to bottom, #dff5e3 0%, #c7ebcf 45%, #aedfb9 100%);
      color: #111;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    h1, h2, h3 {
      text-align: center;
      margin-top: 0;
      color: #111;
      line-height: 1.4;
    }
    h1 { font-size: 2.5rem; }
    h3 {
      font-size: 1.3rem;
      margin-bottom: 12px;
    }
    a {
      color: #111;
      text-decoration: none;
    }
    a:hover {
      color: #111;
      text-decoration: underline;
    }
    .box {
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(0,0,0,0.15);
      padding: 24px;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #111;
    }
    input, button {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      box-sizing: border-box;
      font-size: 16px;
      font-family: inherit;
    }
    input {
      display: block;
      padding: 10px;
      border: 1px solid rgba(0,0,0,0.2);
      background: #fff;
      color: #111;
    }
    button {
      padding: 12px;
      border: none;
      background-color: #4f8f5b;
      color: #111;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }
    button:hover {
      background-color: #6aa676;
    }
    .permission-box {
      margin: 16px 0;
    }
    .permission-box label {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-weight: normal;
      line-height: 1.8;
      margin-bottom: 8px;
    }
    .permission-box input[type="checkbox"] {
      width: auto;
      min-width: auto;
      max-width: none;
      display: inline-block;
      margin-top: 5px;
      padding: 0;
    }
    .subadmin-item {
      padding: 14px 0;
      border-bottom: 1px solid rgba(0,0,0,0.12);
    }
    .subadmin-item:last-child {
      border-bottom: none;
    }
    .subadmin-link {
      display: block;
      text-decoration: none;
      color: #111;
    }
    .subadmin-link:hover {
      text-decoration: underline;
    }
    .subadmin-name {
      font-weight: bold;
      margin-bottom: 6px;
      font-size: 1.1rem;
    }
    .subadmin-meta {
      color: #222;
      white-space: pre-wrap;
      line-height: 1.8;
    }
    .center-link {
      text-align: center;
      margin-top: 16px;
    }
    details {
      margin-top: 20px;
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(0,0,0,0.12);
      padding: 12px;
    }
    summary {
      cursor: pointer;
      font-weight: bold;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 12px 0 0 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <p style="text-align:left; margin-top:0;">
      <a id="admin-user-link" href="#">管理者さん</a>
    </p>

    <h1>準管理者メニュー</h1>

    <p class="center-link">
      <a href="admin-home.html">戻る</a>
    </p>

    <div class="box">
      <h2>準管理者追加</h2>

      <form id="subadmin-form">
        <p>
          <label for="subadmin-name">ユーザー名</label>
          <input type="text" id="subadmin-name" required>
        </p>

        <p>
          <label for="subadmin-password">パスワード</label>
          <input type="password" id="subadmin-password" required>
        </p>

        <h3>権限付与</h3>
        <div class="permission-box" id="create-permissions">
          <label><input type="checkbox" value="account_management">アカウント管理</label>
          <label><input type="checkbox" value="user_danger_control">ユーザー削除・停止</label>
          <label><input type="checkbox" value="notice_management">お知らせ管理</label>
          <label><input type="checkbox" value="music_management">音楽管理</label>
          <label><input type="checkbox" value="novel_management">小説管理</label>
          <label><input type="checkbox" value="database_management">データベース管理</label>
        </div>

        <p>
          <button type="submit" id="create-button">追加</button>
        </p>
      </form>
    </div>

    <div class="box">
      <h2>準管理者一覧</h2>
      <div id="subadmin-list">
        <p>読み込み中...</p>
      </div>

      <p class="center-link">
        <a href="admin-home.html">戻る</a>
      </p>
    </div>

    <details>
      <summary>通信結果</summary>
      <pre id="debug-box">読み込み中...</pre>
    </details>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const adminLoggedIn = sessionStorage.getItem("admin_logged_in");
      const adminUsername = sessionStorage.getItem("admin_username") || "";
      const adminId = sessionStorage.getItem("admin_id");
      const adminRole = sessionStorage.getItem("admin_role") || "";
      const adminStatus = sessionStorage.getItem("admin_status") || "";

      let adminPermissions = [];
      try {
        adminPermissions = JSON.parse(sessionStorage.getItem("admin_permissions") || "[]");
        if (!Array.isArray(adminPermissions)) {
          adminPermissions = [];
        }
      } catch {
        adminPermissions = [];
      }

      if (adminLoggedIn !== "1") {
        window.location.href = "admin-login.html";
        return;
      }

      const adminUserLink = document.getElementById("admin-user-link");
      const debugBox = document.getElementById("debug-box");
      const subadminForm = document.getElementById("subadmin-form");
      const createButton = document.getElementById("create-button");
      const subadminList = document.getElementById("subadmin-list");

      adminUserLink.textContent = adminUsername + "さん";

      const supabaseUrl = "https://ndtxjdhvdedflyqgpizr.supabase.co";
      const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kdHhqZGh2ZGVkZmx5cWdwaXpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjM0MjIsImV4cCI6MjA4OTIzOTQyMn0.IVDQg_I0VeBzE2z7gXiS5p1Ci4k620qYgZSXjyenyb4";

      if (!window.supabase || typeof window.supabase.createClient !== "function") {
        alert("Supabase の読み込みに失敗しました。");
        return;
      }

      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
      const createEndpoint = "https://ndtxjdhvdedflyqgpizr.supabase.co/functions/v1/admin-create-subadmin";

      const permissionLabels = {
        account_management: "アカウント管理",
        user_danger_control: "ユーザー削除・停止",
        notice_management: "お知らせ管理",
        music_management: "音楽管理",
        novel_management: "小説管理",
        database_management: "データベース管理"
      };

      function clearAdminSession() {
        sessionStorage.removeItem("admin_logged_in");
        sessionStorage.removeItem("admin_username");
        sessionStorage.removeItem("admin_id");
        sessionStorage.removeItem("admin_role");
        sessionStorage.removeItem("admin_status");
        sessionStorage.removeItem("admin_permissions");
      }

      function renderDebug(extra = "") {
        debugBox.textContent =
          "admin_username: " + adminUsername + "\n" +
          "admin_id: " + (adminId || "") + "\n" +
          "admin_role: " + adminRole + "\n" +
          "admin_status: " + adminStatus + "\n" +
          "admin_permissions: " + JSON.stringify(adminPermissions, null, 2) +
          (extra ? "\n\n" + extra : "");
      }

      async function writePageLog(actionType, actionLabel, actionDetail) {
        const response = await fetch(`${supabaseUrl}/functions/v1/admin-write-log`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": supabaseKey,
            "Authorization": "Bearer " + supabaseKey
          },
          body: JSON.stringify({
            admin_username: adminUsername,
            target_type: adminRole === "sub_admin" ? "sub_admin" : null,
            target_id: adminRole === "sub_admin" ? adminId : null,
            action_type: actionType,
            action_label: actionLabel,
            action_detail: actionDetail
          })
        });

        const rawText = await response.text();

        renderDebug(
          "log status: " + response.status +
          "\nlog response:\n" + rawText
        );

        return response.ok;
      }

      if (adminStatus !== "active") {
        alert("この管理者アカウントは停止中です。");
        clearAdminSession();
        window.location.href = "admin-login.html";
        return;
      }

      if (adminRole !== "admin") {
        try {
          await writePageLog(
            "admin_forbidden_page_access",
            "権限外ページアクセス",
            "page: admin-management.html / reason: admin以外は不可"
          );
        } catch (error) {
          renderDebug("拒否ログ保存失敗: " + String(error));
        }

        alert("このページは管理者のみ利用できます。");
        window.location.href = "admin-home.html";
        return;
      }

      try {
        await writePageLog(
          "admin_management_view",
          "準管理者メニュー閲覧",
          "page: admin-management.html / role: admin"
        );
      } catch (error) {
        renderDebug("閲覧ログ保存失敗: " + String(error));
      }

      function statusLabel(value) {
        if (value === "active") return "有効";
        if (value === "stopped") return "停止";
        if (value === "suspended") return "停止";
        return value || "";
      }

      function permissionText(values) {
        if (!values || values.length === 0) return "なし";
        return values.map(v => permissionLabels[v] || v).join(" / ");
      }

      function getCheckedPermissions() {
        return Array.from(
          document.querySelectorAll("#create-permissions input[type='checkbox']:checked")
        ).map((input) => input.value);
      }

      async function writeAdminActionLog(targetId, targetUsername, permissions) {
        const { data: me } = await supabase
          .from("admin_accounts")
          .select("id, username, role")
          .eq("username", adminUsername)
          .maybeSingle();

        if (!me) return;

        await supabase.from("admin_action_logs").insert([
          {
            admin_account_id: me.id,
            admin_username: me.username,
            admin_role: me.role,
            target_type: "sub_admin",
            target_id: String(targetId),
            action_type: "sub_admin_create",
            action_label: "準管理者追加",
            action_detail:
              "対象ユーザー名: " + targetUsername + "\n" +
              "付与権限: " + permissionText(permissions)
          }
        ]);
      }

      async function loadSubadmins() {
        subadminList.innerHTML = "<p>読み込み中...</p>";

        const { data, error } = await supabase
          .from("admin_accounts")
          .select("id, username, role, status, permissions, created_at")
          .eq("role", "sub_admin")
          .order("created_at", { ascending: true });

        if (error) {
          subadminList.innerHTML = "<p>読み込みに失敗しました。</p>";
          renderDebug("一覧取得エラー: " + error.message);
          return;
        }

        subadminList.innerHTML = "";

        if (!data || data.length === 0) {
          subadminList.innerHTML = "<p>準管理者はいません。</p>";
          renderDebug("準管理者件数: 0");
          return;
        }

        data.forEach((item) => {
          const row = document.createElement("div");
          row.className = "subadmin-item";

          const link = document.createElement("a");
          link.className = "subadmin-link";
          link.href = "admin-user-detail.html?id=" + encodeURIComponent(item.id);

          const name = document.createElement("div");
          name.className = "subadmin-name";
          name.textContent = item.username || "名称未設定";

          const meta = document.createElement("div");
          meta.className = "subadmin-meta";
          meta.textContent =
            "状態: " + statusLabel(item.status) + "\n" +
            "権限: " + permissionText(item.permissions);

          link.appendChild(name);
          link.appendChild(meta);
          row.appendChild(link);
          subadminList.appendChild(row);
        });

        renderDebug("準管理者件数: " + data.length);
      }

      await loadSubadmins();

      subadminForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const username = document.getElementById("subadmin-name").value.trim();
        const password = document.getElementById("subadmin-password").value;
        const permissions = getCheckedPermissions();

        if (!username || !password) {
          alert("ユーザー名とパスワードを入力してください。");
          return;
        }

        createButton.disabled = true;
        createButton.textContent = "追加中...";

        try {
          const response = await fetch(createEndpoint, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "apikey": supabaseKey,
              "Authorization": "Bearer " + supabaseKey
            },
            body: JSON.stringify({
              admin_username: adminUsername,
              username: username,
              password: password,
              permissions: permissions
            })
          });

          const rawText = await response.text();
          let result = null;

          try {
            result = JSON.parse(rawText);
          } catch (_) {
            renderDebug("追加レスポンス解析失敗\nstatus=" + response.status + "\n\n" + rawText);
            alert("追加に失敗しました。");
            return;
          }

          if (!response.ok || !result || !result.ok) {
            renderDebug(
              "追加エラー\nstatus=" + response.status + "\n\n" +
              JSON.stringify(result, null, 2)
            );
            alert(result?.error || "追加に失敗しました。");
            return;
          }

          await writeAdminActionLog(
            result.sub_admin.id,
            result.sub_admin.username,
            result.sub_admin.permissions || permissions
          );

          alert("準管理者を追加しました。");
          subadminForm.reset();
          await loadSubadmins();
        } catch (err) {
          renderDebug("予期しないエラー: " + String(err));
          alert("追加に失敗しました。");
        } finally {
          createButton.disabled = false;
          createButton.textContent = "追加";
        }
      });
    });
  </script>
</body>
</html>
