<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>準管理者管理</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: linear-gradient(to bottom, #dff5e3 0%, #c7ebcf 45%, #aedfb9 100%);
      color: #111;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1, h2 {
      text-align: center;
      margin-top: 0;
      color: #111;
      line-height: 1.4;
    }

    h1 {
      font-size: 2.5rem;
    }

    a {
      color: #111;
      text-decoration: none;
    }

    a:hover {
      color: #111;
      text-decoration: underline;
    }

    .box {
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(0,0,0,0.15);
      padding: 24px;
      margin-bottom: 20px;
    }

    .box p {
      margin: 12px 0;
      line-height: 1.8;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #111;
    }

    input,
    button {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      box-sizing: border-box;
      font-size: 16px;
      font-family: inherit;
    }

    input {
      display: block;
      padding: 10px;
      border: 1px solid rgba(0,0,0,0.2);
      background: #fff;
      color: #111;
    }

    button {
      padding: 12px;
      border: none;
      background-color: #4f8f5b;
      color: #111;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }

    button:hover {
      background-color: #6aa676;
    }

    .danger-button {
      background-color: #b85b5b;
    }

    .danger-button:hover {
      background-color: #cf7777;
    }

    .subadmin-item {
      padding: 14px 0;
      border-bottom: 1px solid rgba(0,0,0,0.12);
    }

    .subadmin-item:last-child {
      border-bottom: none;
    }

    .subadmin-name {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .subadmin-meta {
      color: #222;
      white-space: pre-wrap;
      margin-bottom: 10px;
      line-height: 1.8;
    }

    .subadmin-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .permission-box {
      margin: 16px 0;
    }

    .permission-box label {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-weight: normal;
      line-height: 1.8;
      margin-bottom: 8px;
    }

    .permission-box input[type="checkbox"] {
      width: auto;
      min-width: auto;
      max-width: none;
      display: inline-block;
      margin-top: 5px;
      padding: 0;
    }

    .center-link {
      text-align: center;
      margin-top: 16px;
    }

    details {
      margin-top: 20px;
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(0,0,0,0.12);
      padding: 12px;
    }

    summary {
      cursor: pointer;
      font-weight: bold;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 12px 0 0 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <p style="text-align: left; margin-top: 0;">
      <a id="admin-user-link" href="#">管理者さん</a>
    </p>

    <h1>準管理者管理</h1>

    <p class="center-link">
      <a href="admin-home.html">戻る</a>
    </p>

    <div class="box">
      <h2>準管理者追加</h2>

      <form id="subadmin-form">
        <p>
          <label for="subadmin-name">ユーザー名</label>
          <input type="text" id="subadmin-name" required>
        </p>

        <p>
          <label for="subadmin-password">パスワード</label>
          <input type="password" id="subadmin-password" required>
        </p>

        <div class="permission-box" id="create-permissions">
          <label><input type="checkbox" name="permissions" value="account_management">アカウント管理</label>
          <label><input type="checkbox" name="permissions" value="user_danger_control">ユーザー削除・停止</label>
          <label><input type="checkbox" name="permissions" value="notice_management">お知らせ管理</label>
          <label><input type="checkbox" name="permissions" value="music_management">音楽管理</label>
          <label><input type="checkbox" name="permissions" value="novel_management">小説管理</label>
          <label><input type="checkbox" name="permissions" value="database_management">データベース管理</label>
        </div>

        <p>
          <button type="submit">追加</button>
        </p>
      </form>
    </div>

    <div class="box">
      <h2>準管理者一覧</h2>
      <div id="subadmin-list">
        <p>読み込み中...</p>
      </div>

      <p class="center-link">
        <a href="admin-home.html">戻る</a>
      </p>
    </div>

    <details>
      <summary>通信結果</summary>
      <pre id="debug-box">読み込み中...</pre>
    </details>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      if (sessionStorage.getItem("admin_logged_in") !== "1") {
        window.location.href = "admin-login.html";
        return;
      }

      const adminUsername = sessionStorage.getItem("admin_username") || "管理者";
      const adminRole = sessionStorage.getItem("admin_role") || "";
      const adminStatus = sessionStorage.getItem("admin_status") || "";
      const adminPermissions = JSON.parse(sessionStorage.getItem("admin_permissions") || "[]");

      const adminUserLink = document.getElementById("admin-user-link");
      const subadminForm = document.getElementById("subadmin-form");
      const subadminList = document.getElementById("subadmin-list");
      const submitButton = subadminForm.querySelector('button[type="submit"]');
      const debugBox = document.getElementById("debug-box");

      adminUserLink.textContent = adminUsername + "さん";

      if (adminStatus !== "active") {
        alert("この管理者アカウントは停止中です。");
        sessionStorage.removeItem("admin_logged_in");
        sessionStorage.removeItem("admin_username");
        sessionStorage.removeItem("admin_role");
        sessionStorage.removeItem("admin_status");
        sessionStorage.removeItem("admin_permissions");
        window.location.href = "admin-login.html";
        return;
      }

      if (adminRole !== "admin") {
        alert("このページは管理者のみ利用できます。");
        window.location.href = "admin-home.html";
        return;
      }

      if (!window.supabase || typeof window.supabase.createClient !== "function") {
        alert("Supabase の読み込みに失敗しました。");
        return;
      }

      const supabaseUrl = "https://ndtxjdhvdedflyqgpizr.supabase.co";
      const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kdHhqZGh2ZGVkZmx5cWdwaXpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjM0MjIsImV4cCI6MjA4OTIzOTQyMn0.IVDQg_I0VeBzE2z7gXiS5p1Ci4k620qYgZSXjyenyb4";
      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

      const permissionLabels = {
        account_management: "アカウント管理",
        user_danger_control: "ユーザー削除・停止",
        notice_management: "お知らせ管理",
        music_management: "音楽管理",
        novel_management: "小説管理",
        database_management: "データベース管理"
      };

      function renderDebug(extra = "") {
        debugBox.textContent =
          "admin_username: " + adminUsername + "\n" +
          "admin_role: " + adminRole + "\n" +
          "admin_status: " + adminStatus + "\n" +
          "admin_permissions: " + JSON.stringify(adminPermissions, null, 2) +
          (extra ? "\n\n" + extra : "");
      }

      function statusLabel(value) {
        if (value === "active") return "有効";
        if (value === "stopped") return "停止";
        return value || "";
      }

      function permissionText(values) {
        if (!values || values.length === 0) return "なし";
        return values.map((value) => permissionLabels[value] || value).join(" / ");
      }

      function checkedPermissionsFromContainer(container) {
        return Array.from(container.querySelectorAll('input[type="checkbox"]:checked')).map(input => input.value);
      }

      function permissionEditorHtml(idPrefix, selectedPermissions = []) {
        const keys = Object.keys(permissionLabels);
        return keys.map((key) => {
          const checked = selectedPermissions.includes(key) ? "checked" : "";
          return `<label><input type="checkbox" data-group="${idPrefix}" value="${key}" ${checked}>${permissionLabels[key]}</label>`;
        }).join("");
      }

      async function loadSubadmins() {
        subadminList.innerHTML = "<p>読み込み中...</p>";

        const { data, error } = await supabase
          .from("admin_accounts")
          .select("id, username, role, status, permissions, created_at")
          .eq("role", "sub_admin")
          .order("created_at", { ascending: true });

        if (error) {
          subadminList.innerHTML = "<p>読み込みに失敗しました。</p>";
          renderDebug("一覧取得エラー: " + error.message);
          return;
        }

        renderSubadmins(data || []);
        renderDebug("準管理者件数: " + (data || []).length);
      }

      function renderSubadmins(items) {
        subadminList.innerHTML = "";

        if (!items || items.length === 0) {
          subadminList.innerHTML = "<p>準管理者はいません。</p>";
          return;
        }

        items.forEach((item) => {
          const row = document.createElement("div");
          row.className = "subadmin-item";

          const name = document.createElement("div");
          name.className = "subadmin-name";
          name.textContent = item.username || "名称未設定";

          const meta = document.createElement("div");
          meta.className = "subadmin-meta";
          meta.textContent =
            "状態: " + statusLabel(item.status) + "\n" +
            "権限: " + permissionText(item.permissions);

          const actions = document.createElement("div");
          actions.className = "subadmin-actions";

          const editNameBtn = document.createElement("button");
          editNameBtn.type = "button";
          editNameBtn.textContent = "ユーザー名変更";
          editNameBtn.addEventListener("click", async () => {
            const newName = window.prompt("新しいユーザー名を入力してください", item.username || "");
            if (newName === null) return;
            const trimmed = newName.trim();
            if (!trimmed) return;

            const response = await fetch("https://ndtxjdhvdedflyqgpizr.supabase.co/functions/v1/admin-update-subadmin", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "apikey": supabaseKey
              },
              body: JSON.stringify({
                admin_username: adminUsername,
                subadmin_id: item.id,
                username: trimmed
              })
            });

            const result = await response.json();
            if (!response.ok || !result?.ok) {
              alert(result?.error || "変更に失敗しました。");
              renderDebug("ユーザー名変更エラー: " + (result?.error || response.status));
              return;
            }

            await loadSubadmins();
          });

          const editPasswordBtn = document.createElement("button");
          editPasswordBtn.type = "button";
          editPasswordBtn.textContent = "パスワード変更";
          editPasswordBtn.addEventListener("click", async () => {
            const newPassword = window.prompt("新しいパスワードを入力してください");
            if (newPassword === null) return;
            if (!newPassword) return;

            const response = await fetch("https://ndtxjdhvdedflyqgpizr.supabase.co/functions/v1/admin-update-subadmin", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "apikey": supabaseKey
              },
              body: JSON.stringify({
                admin_username: adminUsername,
                subadmin_id: item.id,
                password: newPassword
              })
            });

            const result = await response.json();
            if (!response.ok || !result?.ok) {
              alert(result?.error || "変更に失敗しました。");
              renderDebug("パスワード変更エラー: " + (result?.error || response.status));
              return;
            }

            alert("パスワードを変更しました。");
            await loadSubadmins();
          });

          const editPermissionsBtn = document.createElement("button");
          editPermissionsBtn.type = "button";
          editPermissionsBtn.textContent = "権限変更";
          editPermissionsBtn.addEventListener("click", async () => {
            const wrap = document.createElement("div");
            wrap.className = "permission-box";
            wrap.innerHTML = permissionEditorHtml("edit-" + item.id, item.permissions || []);

            const temp = document.createElement("div");
            temp.appendChild(wrap);

            const ok = window.confirm("権限編集モードに入るため、OKを押したあと下の通信結果を確認してください。");
            if (!ok) return;

            subadminList.innerHTML = "";
            const editRow = document.createElement("div");
            editRow.className = "subadmin-item";

            const title = document.createElement("div");
            title.className = "subadmin-name";
            title.textContent = item.username + " の権限変更";

            const box = document.createElement("div");
            box.className = "permission-box";
            box.innerHTML = permissionEditorHtml("live-" + item.id, item.permissions || []);

            const saveBtn = document.createElement("button");
            saveBtn.type = "button";
            saveBtn.textContent = "権限を保存";
            saveBtn.addEventListener("click", async () => {
              const nextPermissions = Array.from(box.querySelectorAll('input[type="checkbox"]:checked')).map(input => input.value);

              const response = await fetch("https://ndtxjdhvdedflyqgpizr.supabase.co/functions/v1/admin-update-subadmin", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "apikey": supabaseKey
                },
                body: JSON.stringify({
                  admin_username: adminUsername,
                  subadmin_id: item.id,
                  permissions: nextPermissions
                })
              });

              const result = await response.json();
              if (!response.ok || !result?.ok) {
                alert(result?.error || "権限変更に失敗しました。");
                renderDebug("権限変更エラー: " + (result?.error || response.status));
                return;
              }

              await loadSubadmins();
            });

            const cancelBtn = document.createElement("button");
            cancelBtn.type = "button";
            cancelBtn.className = "danger-button";
            cancelBtn.textContent = "キャンセル";
            cancelBtn.addEventListener("click", async () => {
              await loadSubadmins();
            });

            editRow.appendChild(title);
            editRow.appendChild(box);
            editRow.appendChild(saveBtn);
            editRow.appendChild(cancelBtn);
            subadminList.appendChild(editRow);
          });

          const stopBtn = document.createElement("button");
          stopBtn.type = "button";
          stopBtn.textContent = item.status === "stopped" ? "有効化" : "停止";
          stopBtn.addEventListener("click", async () => {
            const nextStatus = item.status === "stopped" ? "active" : "stopped";

            const response = await fetch("https://ndtxjdhvdedflyqgpizr.supabase.co/functions/v1/admin-update-subadmin", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "apikey": supabaseKey
              },
              body: JSON.stringify({
                admin_username: adminUsername,
                subadmin_id: item.id,
                status: nextStatus
              })
            });

            const result = await response.json();
            if (!response.ok || !result?.ok) {
              alert(result?.error || "状態変更に失敗しました。");
              renderDebug("状態変更エラー: " + (result?.error || response.status));
              return;
            }

            await loadSubadmins();
          });

          const deleteBtn = document.createElement("button");
          deleteBtn.type = "button";
          deleteBtn.className = "danger-button";
          deleteBtn.textContent = "削除";
          deleteBtn.addEventListener("click", async () => {
            const ok = window.confirm("この準管理者を削除しますか？");
            if (!ok) return;

            const response = await fetch("https://ndtxjdhvdedflyqgpizr.supabase.co/functions/v1/admin-delete-subadmin", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "apikey": supabaseKey
              },
              body: JSON.stringify({
                admin_username: adminUsername,
                subadmin_id: item.id
              })
            });

            const result = await response.json();
            if (!response.ok || !result?.ok) {
              alert(result?.error || "削除に失敗しました。");
              renderDebug("削除エラー: " + (result?.error || response.status));
              return;
            }

            await loadSubadmins();
          });

          actions.appendChild(editNameBtn);
          actions.appendChild(editPasswordBtn);
          actions.appendChild(editPermissionsBtn);
          actions.appendChild(stopBtn);
          actions.appendChild(deleteBtn);

          row.appendChild(name);
          row.appendChild(meta);
          row.appendChild(actions);

          subadminList.appendChild(row);
        });
      }

      await loadSubadmins();

      subadminForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const username = document.getElementById("subadmin-name").value.trim();
        const password = document.getElementById("subadmin-password").value;
        const permissions = checkedPermissionsFromContainer(document.getElementById("create-permissions"));

        if (!username || !password) {
          alert("ユーザー名とパスワードを入力してください。");
          return;
        }

        submitButton.disabled = true;
        submitButton.textContent = "追加中...";

        try {
          const response = await fetch("https://ndtxjdhvdedflyqgpizr.supabase.co/functions/v1/admin-create-subadmin", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "apikey": supabaseKey
            },
            body: JSON.stringify({
              admin_username: adminUsername,
              username,
              password,
              permissions
            })
          });

          const result = await response.json();

          if (!response.ok || !result?.ok) {
            alert(result?.error || "追加に失敗しました。");
            renderDebug("追加エラー: " + (result?.error || response.status));
            return;
          }

          alert("準管理者を追加しました。");
          subadminForm.reset();
          await loadSubadmins();
        } catch (err) {
          alert("予期しないエラーが発生しました。");
          renderDebug("予期しないエラー: " + String(err));
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = "追加";
        }
      });
    });
  </script>
</body>
</html>
