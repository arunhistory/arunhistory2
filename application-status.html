<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>申請状況</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: linear-gradient(to bottom, #0b1026 0%, #1a2342 45%, #2f3d68 100%);
      color: #f5f5f5;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-top: 0;
      font-size: 2.5rem;
      line-height: 1.4;
    }

    a {
      color: #f2d9e8;
      text-decoration: none;
    }

    a:hover {
      color: #ffe7f3;
      text-decoration: none;
    }

    .box {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.25);
      padding: 24px;
    }

    .box p {
      margin: 12px 0;
      line-height: 1.8;
    }

    .disabled-text {
      color: rgba(255,255,255,0.7);
    }
  </style>
</head>
<body>
  <div class="container">
    <p id="username-line" style="text-align: left; margin-top: 0;">ユーザーさん</p>

    <h1>申請状況</h1>

    <div class="box">
      <p>ライセンス申請: <span id="license-application-status">読み込み中...</span></p>
      <p>小説応援申請: <span id="novel-support-application-status">読み込み中...</span></p>

      <p id="license-application-link-wrap"><a href="license-application.html">ライセンス申請へ</a></p>
      <p id="novel-support-application-link-wrap"><a href="novel-support-application.html">小説応援申請へ</a></p>

      <p><a href="mypage.html">マイページへ戻る</a></p>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const usernameLine = document.getElementById("username-line");
      const licenseStatusEl = document.getElementById("license-application-status");
      const novelStatusEl = document.getElementById("novel-support-application-status");
      const licenseLinkWrap = document.getElementById("license-application-link-wrap");
      const novelLinkWrap = document.getElementById("novel-support-application-link-wrap");

      if (!window.supabase || typeof window.supabase.createClient !== "function") {
        alert("Supabase の読み込みに失敗しました。");
        return;
      }

      const supabaseUrl = "https://ndtxjdhvdedflyqgpizr.supabase.co";
      const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kdHhqZGh2ZGVkZmx5cWdwaXpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjM0MjIsImV4cCI6MjA4OTIzOTQyMn0.IVDQg_I0VeBzE2z7gXiS5p1Ci4k620qYgZSXjyenyb4";
      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

      if (sessionStorage.getItem("admin_logged_in") !== "1") {
        const { data: maintenanceSetting, error: maintenanceError } = await supabase
          .from("site_settings")
          .select("setting_value")
          .eq("setting_key", "maintenance_mode")
          .maybeSingle();

        if (!maintenanceError && maintenanceSetting?.setting_value === "on") {
          window.location.href = "maintenance.html";
          return;
        }
      }

      const { data: userData } = await supabase.auth.getUser();
      const user = userData?.user;

      if (!user) {
        window.location.href = "login.html?redirect=application-status.html";
        return;
      }

      const { data: account } = await supabase
        .from("accounts")
        .select("display_name")
        .eq("user_id", user.id)
        .maybeSingle();

      const displayName =
        account?.display_name ||
        user.user_metadata?.username ||
        "ユーザー";

      usernameLine.textContent = displayName + "さん";

      const { data: licenseApplication } = await supabase
        .from("license_applications")
        .select("status")
        .eq("user_id", user.id)
        .order("created_at", { ascending: false })
        .limit(1)
        .maybeSingle();

      const { data: novelSupportApplication } = await supabase
        .from("novel_support_applications")
        .select("status")
        .eq("user_id", user.id)
        .order("created_at", { ascending: false })
        .limit(1)
        .maybeSingle();

      const licenseStatus = licenseApplication?.status || "申請前";
      const novelStatus = novelSupportApplication?.status || "申請前";

      licenseStatusEl.textContent = licenseStatus;
      novelStatusEl.textContent = novelStatus;

      if (licenseStatus === "申請前" || licenseStatus === "却下") {
        licenseLinkWrap.innerHTML = '<a href="license-application.html">ライセンス申請へ</a>';
      } else {
        licenseLinkWrap.innerHTML = '<span class="disabled-text">ライセンス申請は現在できません</span>';
      }

      if (novelStatus === "申請前" || novelStatus === "却下") {
        novelLinkWrap.innerHTML = '<a href="novel-support-application.html">小説応援申請へ</a>';
      } else {
        novelLinkWrap.innerHTML = '<span class="disabled-text">小説応援申請は現在できません</span>';
      }
    });
  </script>
</body>
</html>
