<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>予約投稿一覧</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: linear-gradient(to bottom, #dff5e3 0%, #c7ebcf 45%, #aedfb9 100%);
      color: #111;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 20px;
      color: #111;
      line-height: 1.4;
      font-size: 2.4rem;
    }

    a {
      color: #111;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .box {
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(0,0,0,0.15);
      padding: 24px;
      margin-bottom: 20px;
    }

    .center-link {
      text-align: center;
      margin: 16px 0;
    }

    .item {
      display: block;
      border-bottom: 1px solid rgba(0,0,0,0.12);
      padding: 14px 0;
    }

    .item:last-child {
      border-bottom: none;
    }

    .item-title {
      font-weight: bold;
      margin-bottom: 6px;
      line-height: 1.8;
    }

    .item-meta {
      white-space: pre-wrap;
      line-height: 1.8;
      color: #222;
    }

    details {
      margin-top: 20px;
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(0,0,0,0.12);
      padding: 12px;
    }

    summary {
      cursor: pointer;
      font-weight: bold;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 12px 0 0 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <p style="text-align:left; margin-top:0;">
      <a id="admin-user-link" href="#">管理者さん</a>
    </p>

    <h1>予約投稿一覧</h1>

    <p class="center-link">
      <a href="notice-management.html">戻る</a>
    </p>

    <div class="box">
      <div id="scheduled-list">
        <p>読み込み中...</p>
      </div>
    </div>

    <p class="center-link">
      <a href="notice-management.html">戻る</a>
    </p>

    <details>
      <summary>通信結果</summary>
      <pre id="debug-box">読み込み中...</pre>
    </details>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      if (sessionStorage.getItem("admin_logged_in") !== "1") {
        window.location.href = "admin-login.html";
        return;
      }

      const adminUsername = sessionStorage.getItem("admin_username") || "管理者";
      const adminId = sessionStorage.getItem("admin_id");
      const adminRole = sessionStorage.getItem("admin_role") || "";
      const adminStatus = sessionStorage.getItem("admin_status") || "";

      let adminPermissions = [];
      try {
        adminPermissions = JSON.parse(sessionStorage.getItem("admin_permissions") || "[]");
        if (!Array.isArray(adminPermissions)) {
          adminPermissions = [];
        }
      } catch {
        adminPermissions = [];
      }

      const adminUserLink = document.getElementById("admin-user-link");
      const scheduledList = document.getElementById("scheduled-list");
      const debugBox = document.getElementById("debug-box");

      adminUserLink.textContent = adminUsername + "さん";

      function clearAdminSession() {
        sessionStorage.removeItem("admin_logged_in");
        sessionStorage.removeItem("admin_username");
        sessionStorage.removeItem("admin_id");
        sessionStorage.removeItem("admin_role");
        sessionStorage.removeItem("admin_status");
        sessionStorage.removeItem("admin_permissions");
      }

      function renderDebug(extra = "") {
        debugBox.textContent =
          "admin_username: " + adminUsername + "\n" +
          "admin_id: " + (adminId || "") + "\n" +
          "admin_role: " + adminRole + "\n" +
          "admin_status: " + adminStatus + "\n" +
          "admin_permissions: " + JSON.stringify(adminPermissions, null, 2) +
          (extra ? "\n\n" + extra : "");
      }

      if (adminStatus !== "active") {
        alert("この管理者アカウントは停止中です。");
        clearAdminSession();
        window.location.href = "admin-login.html";
        return;
      }

      const canUseNoticeManagement =
        adminRole === "admin" ||
        (adminRole === "sub_admin" && adminPermissions.includes("notice_management"));

      if (!canUseNoticeManagement) {
        alert("この機能を使う権限がありません。");
        window.location.href = "admin-home.html";
        return;
      }

      if (!window.supabase || typeof window.supabase.createClient !== "function") {
        alert("Supabase の読み込みに失敗しました。");
        return;
      }

      const supabaseUrl = "https://ndtxjdhvdedflyqgpizr.supabase.co";
      const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kdHhqZGh2ZGVkZmx5cWdwaXpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjM0MjIsImV4cCI6MjA4OTIzOTQyMn0.IVDQg_I0VeBzE2z7gXiS5p1Ci4k620qYgZSXjyenyb4";
      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

      function renderItems(items) {
        scheduledList.innerHTML = "";

        if (!items || items.length === 0) {
          scheduledList.innerHTML = "<p>予約投稿はありません。</p>";
          return;
        }

        items.forEach((item) => {
          const link = document.createElement("a");
          link.className = "item";
          link.href = "scheduled-notice-detail.html?id=" + encodeURIComponent(item.id);

          const title = document.createElement("div");
          title.className = "item-title";
          title.textContent = item.title || "件名なし";

          const meta = document.createElement("div");
          meta.className = "item-meta";

          const parts = [];
          parts.push("予約ID: " + item.id);

          if (item.target_license_status) {
            parts.push("ライセンス条件: " + item.target_license_status);
          } else {
            parts.push("ライセンス条件: 指定なし");
          }

          if (item.target_novel_support_status) {
            parts.push("小説応援条件: " + item.target_novel_support_status);
          } else {
            parts.push("小説応援条件: 指定なし");
          }

          parts.push("予約日時: " + (item.scheduled_at ? new Date(item.scheduled_at).toLocaleString("ja-JP") : ""));
          parts.push("作成者: " + (item.created_by_admin || ""));
          parts.push("状態: " + (item.status || ""));

          meta.textContent = parts.join("\n");

          link.appendChild(title);
          link.appendChild(meta);
          scheduledList.appendChild(link);
        });
      }

      async function loadScheduledNotices() {
        scheduledList.innerHTML = "<p>読み込み中...</p>";

        const { data, error } = await supabase
          .from("scheduled_notices")
          .select("id, title, target_license_status, target_novel_support_status, scheduled_at, created_by_admin, status")
          .eq("status", "scheduled")
          .order("scheduled_at", { ascending: true });

        if (error) {
          scheduledList.innerHTML = "<p>読み込みに失敗しました。</p>";
          renderDebug("予約一覧取得エラー: " + error.message);
          return;
        }

        renderItems(data || []);
        renderDebug("予約件数: " + ((data || []).length));
      }

      await loadScheduledNotices();
    });
  </script>
</body>
</html>
